<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121210">
    <title>Daily OS</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #121210;
            --surface: #1c1c16;
            --surface-2: #242418;
            --border: rgba(240, 220, 160, 0.08);
            --text: #f0e8d0;
            --text-2: #9a9480;
            --text-3: #4a4840;
            --accent: #e8940a;
            --accent-dim: rgba(232, 148, 10, 0.12);
            --positive: #5caa6f;
            --negative: #cc5555;
            --font-display: 'Fraunces', Georgia, serif;
            --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
            --nav-height: 72px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 16px;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .view {
            display: none;
            padding: 24px 20px calc(var(--nav-height) + env(safe-area-inset-bottom, 0px) + 16px);
            min-height: 100vh;
            min-height: 100dvh;
        }
        .view.active { display: block; }

        /* Bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            height: calc(var(--nav-height) + env(safe-area-inset-bottom, 0px));
            background: rgba(24, 24, 18, 0.96);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            padding-top: 10px;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 6px 0;
            color: var(--text-3);
            transition: color 0.2s;
            user-select: none;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 22px; height: 22px; }
        .nav-item span { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }

        /* Type */
        h1 { font-family: var(--font-display); font-size: 34px; font-weight: 300; line-height: 1.1; letter-spacing: -0.02em; }
        h2 { font-family: var(--font-display); font-size: 24px; font-weight: 400; line-height: 1.2; }
        h3 { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-2); }

        /* Cards */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
        .card-accent { background: var(--accent-dim); border-color: rgba(232, 148, 10, 0.18); }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 14px 24px; border-radius: 12px;
            font-family: var(--font-body); font-size: 15px; font-weight: 600;
            cursor: pointer; border: none; transition: all 0.15s;
        }
        .btn-primary { background: var(--accent); color: #121210; width: 100%; }
        .btn-primary:active { opacity: 0.82; transform: scale(0.98); }
        .btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); }
        .btn-ghost:active { opacity: 0.7; }
        .btn-sm { padding: 10px 16px; font-size: 13px; border-radius: 8px; }

        /* Scale buttons */
        .scale-buttons { display: flex; gap: 8px; margin-top: 16px; }
        .scale-btn {
            flex: 1; aspect-ratio: 1; border-radius: 12px;
            background: var(--surface-2); border: 2px solid transparent;
            color: var(--text-2); font-size: 19px; font-weight: 600;
            font-family: var(--font-display); cursor: pointer;
            transition: all 0.15s; display: flex; align-items: center; justify-content: center;
        }
        .scale-btn:active { transform: scale(0.9); }
        .scale-btn.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

        /* Option buttons */
        .option-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
        .option-btn {
            padding: 15px 18px; border-radius: 12px; background: var(--surface-2);
            border: 2px solid transparent; color: var(--text); font-family: var(--font-body);
            font-size: 15px; font-weight: 500; cursor: pointer; text-align: left;
            transition: all 0.15s; display: flex; align-items: center; gap: 14px;
        }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.selected { background: var(--accent-dim); border-color: var(--accent); }
        .opt-icon { font-size: 18px; width: 24px; text-align: center; color: var(--text-2); font-style: normal; font-family: monospace; font-weight: 400; }
        .opt-label { flex: 1; line-height: 1.1; }
        .opt-sub { font-size: 12px; color: var(--text-2); font-weight: 400; margin-top: 2px; }

        /* Text inputs */
        .text-input {
            width: 100%; background: var(--surface-2); border: 1.5px solid var(--border);
            border-radius: 12px; padding: 14px 16px; color: var(--text);
            font-family: var(--font-body); font-size: 16px; margin-top: 14px;
            resize: none; outline: none; transition: border-color 0.15s;
        }
        .text-input:focus { border-color: rgba(232, 148, 10, 0.5); }
        .text-input::placeholder { color: var(--text-3); }

        /* Check-in */
        .checkin-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--accent-dim); color: var(--accent);
            border-radius: 20px; padding: 5px 12px;
            font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
            margin-bottom: 14px;
        }

        .progress-bar { height: 2px; background: var(--surface-2); border-radius: 2px; margin-bottom: 32px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .step { display: none; }
        .step.active { display: block; animation: slideIn 0.28s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }

        .question-label { font-family: var(--font-display); font-size: 28px; font-weight: 300; line-height: 1.2; margin-bottom: 6px; }
        .question-sub { color: var(--text-2); font-size: 14px; line-height: 1.5; }

        .nav-row { display: flex; gap: 8px; margin-top: 14px; }
        .nav-row .btn { flex: 1; }

        /* Insights */
        .metric-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .metric-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: center; }
        .metric-value { font-family: var(--font-display); font-size: 38px; font-weight: 300; color: var(--accent); line-height: 1; margin-bottom: 6px; }
        .metric-label { font-size: 10px; color: var(--text-2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; line-height: 1.4; }

        .chart-wrap { position: relative; height: 160px; margin-top: 16px; }

        /* Log */
        .log-entry { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; }
        .log-entry-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .type-badge { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 10px; border-radius: 8px; }
        .type-badge.morning { background: rgba(232, 148, 10, 0.15); color: var(--accent); }
        .type-badge.afternoon { background: rgba(92, 170, 111, 0.15); color: var(--positive); }

        .me-row { display: flex; gap: 16px; margin-bottom: 8px; }
        .me-stat { display: flex; align-items: baseline; gap: 5px; font-size: 13px; color: var(--text-2); }
        .me-stat strong { font-family: var(--font-display); font-size: 22px; font-weight: 300; }

        /* Settings */
        .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .settings-row:last-child { border-bottom: none; }
        .settings-label { font-size: 15px; font-weight: 500; }
        .settings-sub { font-size: 12px; color: var(--text-2); margin-top: 2px; }

        /* Empty state */
        .empty-state { text-align: center; padding: 52px 20px; color: var(--text-2); }
        .empty-icon { font-size: 44px; margin-bottom: 16px; }
        .empty-state p { font-size: 14px; line-height: 1.7; }

        /* Toast */
        .toast {
            position: fixed; bottom: calc(var(--nav-height) + 16px);
            left: 50%; transform: translateX(-50%) translateY(16px);
            background: var(--surface-2); border: 1px solid rgba(240,220,160,0.15);
            border-radius: 12px; padding: 12px 20px;
            font-size: 14px; font-weight: 500;
            opacity: 0; transition: all 0.28s; z-index: 200;
            white-space: nowrap; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Done state */
        .done-card { text-align: center; padding: 28px 16px; }
        .done-icon { font-size: 52px; margin-bottom: 14px; display: block; }
        .done-title { font-family: var(--font-display); font-size: 26px; font-weight: 300; margin-bottom: 8px; }
        .done-sub { font-size: 14px; color: var(--text-2); line-height: 1.7; }

        /* Phase card */
        .phase-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; overflow: hidden; position: relative; }
        .phase-card::after { content: ''; position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; border-radius: 50%; background: var(--phase-glow, rgba(232,148,10,0.1)); }
        .phase-name { font-family: var(--font-display); font-size: 22px; font-weight: 400; margin-top: 8px; margin-bottom: 6px; }
        .phase-desc { font-size: 13px; color: var(--text-2); line-height: 1.6; }

        @keyframes pop { 0% { transform: scale(0.7); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        .pop { animation: pop 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: inline-block; }

        /* Delta badge */
        .delta { display: inline-flex; align-items: baseline; gap: 4px; }
        .delta .val { font-family: var(--font-display); font-size: 36px; font-weight: 300; }

        code { font-family: 'Courier New', monospace; font-size: 12px; background: var(--surface-2); padding: 2px 6px; border-radius: 4px; }

        ::-webkit-scrollbar { width: 0; }

        /* Section header */
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; margin-top: 20px; }
        .section-header:first-child { margin-top: 0; }

        /* FAB */
        .fab {
            position: fixed;
            right: 20px;
            bottom: calc(var(--nav-height) + env(safe-area-inset-bottom, 0px) + 16px);
            width: 52px; height: 52px;
            border-radius: 50%;
            background: var(--accent);
            border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(232,148,10,0.35);
            z-index: 90;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .fab:active { transform: scale(0.92); box-shadow: 0 2px 10px rgba(232,148,10,0.2); }
        .fab svg { width: 22px; height: 22px; stroke: #121210; }

        /* Quick log modal */
        .ql-modal {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(12,12,10,0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: flex-end;
        }
        .ql-inner {
            width: 100%; max-width: 480px; margin: 0 auto;
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            border-top: 1px solid rgba(240,220,160,0.1);
            max-height: 88vh;
            display: flex; flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom, 0px);
            animation: slideUp 0.28s cubic-bezier(0.4,0,0.2,1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .ql-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .ql-title { font-family: var(--font-display); font-size: 20px; font-weight: 400; }
        .ql-close {
            background: var(--surface-2); border: none; color: var(--text-2);
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
            font-size: 13px; display: flex; align-items: center; justify-content: center;
        }
        .ql-body {
            padding: 20px; overflow-y: auto; flex: 1;
            display: flex; flex-direction: column; gap: 14px;
        }

        /* Conversation bubbles */
        .bubble {
            max-width: 88%; padding: 12px 16px; border-radius: 18px;
            font-size: 15px; line-height: 1.5; animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .bubble-ai {
            background: var(--surface-2); color: var(--text);
            border-bottom-left-radius: 4px; align-self: flex-start;
        }
        .bubble-user {
            background: var(--accent-dim); color: var(--text);
            border: 1px solid rgba(232,148,10,0.18);
            border-bottom-right-radius: 4px; align-self: flex-end;
        }
        .bubble-action {
            background: rgba(92,170,111,0.1); color: var(--positive);
            border: 1px solid rgba(92,170,111,0.2);
            border-radius: 12px; align-self: stretch;
            font-size: 13px; font-weight: 500;
        }
        .bubble-thinking {
            background: var(--surface-2); align-self: flex-start;
            padding: 14px 18px; border-bottom-left-radius: 4px;
        }
        .dot-pulse { display: flex; gap: 5px; align-items: center; }
        .dot-pulse span {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--text-3); animation: dpulse 1.2s infinite;
        }
        .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
        .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dpulse { 0%,60%,100% { opacity: 0.3; transform: scale(0.8); } 30% { opacity: 1; transform: scale(1); } }

        /* Input area */
        .ql-input-row {
            display: flex; gap: 10px; align-items: flex-end;
            padding: 12px 20px 16px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .ql-textarea {
            flex: 1; background: var(--surface-2); border: 1.5px solid var(--border);
            border-radius: 16px; padding: 12px 14px; color: var(--text);
            font-family: var(--font-body); font-size: 15px;
            resize: none; outline: none; max-height: 120px;
            transition: border-color 0.15s; line-height: 1.4;
        }
        .ql-textarea:focus { border-color: rgba(232,148,10,0.4); }
        .ql-textarea::placeholder { color: var(--text-3); }
        .ql-send {
            width: 42px; height: 42px; border-radius: 50%;
            background: var(--accent); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: opacity 0.15s;
        }
        .ql-send:disabled { opacity: 0.35; cursor: default; }
        .ql-send svg { width: 18px; height: 18px; stroke: #121210; }

        /* Edit entry modal */
        .edit-field { margin-bottom: 18px; }
        .edit-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-2); margin-bottom: 4px; display: block; }
        .edit-scale-row { display: flex; gap: 6px; margin-top: 4px; }
        .edit-scale-btn { flex: 1; padding: 10px 0; border-radius: 10px; background: var(--surface-2); border: 2px solid transparent; color: var(--text-2); font-size: 16px; font-weight: 600; font-family: var(--font-display); cursor: pointer; transition: all 0.15s; text-align: center; }
        .edit-scale-btn.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
        .edit-select { width: 100%; background: var(--surface-2); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: var(--font-body); font-size: 15px; outline: none; -webkit-appearance: none; margin-top: 4px; }
        .edit-select:focus { border-color: rgba(232,148,10,0.4); }
    </style>
</head>
<body>
<div class="app">
    <div id="view-checkin" class="view active"></div>
    <div id="view-insights" class="view"></div>
    <div id="view-log" class="view"></div>
    <div id="view-settings" class="view"></div>

    <nav class="bottom-nav">
        <div class="nav-item active" data-view="checkin" onclick="navigate('checkin')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
            </svg>
            <span>Check In</span>
        </div>
        <div class="nav-item" data-view="insights" onclick="navigate('insights')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <path d="M3 20h18M7 20V10M12 20V4M17 20v-7"/>
            </svg>
            <span>Insights</span>
        </div>
        <div class="nav-item" data-view="log" onclick="navigate('log')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            <span>Log</span>
        </div>
        <div class="nav-item" data-view="settings" onclick="navigate('settings')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
            <span>Setup</span>
        </div>
    </nav>
</div>

    <!-- Floating quick-log button -->
    <button class="fab" onclick="openQuickLog()" id="fab" title="Quick log">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <!-- Quick log modal -->
    <div id="ql-modal" class="ql-modal" style="display:none;">
        <div class="ql-inner">
            <div class="ql-header">
                <span class="ql-title">Quick log</span>
                <button class="ql-close" onclick="closeQuickLog()">&#x2715;</button>
            </div>
            <div id="ql-body" class="ql-body"></div>
            <div class="ql-input-row" id="ql-input-row">
                <textarea class="ql-textarea" id="ql-input" rows="1" placeholder="What's going on..."
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendQL();}"
                    oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';document.getElementById('ql-send').disabled=!this.value.trim();"
                ></textarea>
                <button class="ql-send" id="ql-send" disabled onclick="sendQL()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Edit entry modal -->
    <div id="edit-modal" class="ql-modal" style="display:none;">
        <div class="ql-inner" style="max-height:92vh;">
            <div class="ql-header">
                <span class="ql-title" id="edit-modal-title">Edit entry</span>
                <button class="ql-close" onclick="closeEditModal()">&#x2715;</button>
            </div>
            <div id="edit-modal-body" class="ql-body" style="gap:0;padding-bottom:8px;"></div>
            <div style="padding:12px 20px 16px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;">
                <button class="btn btn-ghost" onclick="closeEditModal()" style="flex:1;">Cancel</button>
                <button class="btn btn-primary" onclick="saveEditedEntry()" id="edit-save-btn" style="flex:2;">Save changes</button>
            </div>
        </div>
    </div>

<div id="toast" class="toast"></div>

<script>

// HTML escape helper — used wherever user-generated text is injected into innerHTML
function esc(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

// Cycle phase lookup
function getCyclePhase(day) {
    if (!day || day < 1) return null;
    if (day <= 5)  return { name: 'Menstrual',   color: '#cc6666', glow: 'rgba(204,102,102,0.12)',   desc: 'Rest if you can. Energy is lower and that\'s completely normal.' };
    if (day <= 13) return { name: 'Follicular',  color: '#5caa6f', glow: 'rgba(92,170,111,0.12)',    desc: 'Energy rising. Good phase for new ideas and tackling hard things.' };
    if (day <= 16) return { name: 'Ovulatory',   color: '#e8940a', glow: 'rgba(232,148,10,0.14)',    desc: 'Peak energy and confidence window. Make the most of it.' };
    if (day <= 35) return { name: 'Luteal',      color: '#9b7cdb', glow: 'rgba(155,124,219,0.12)',   desc: 'Energy dropping toward period. PMDD risk window — be extra gentle with yourself.' };
    return null;
}

// ============================================================
// SUPABASE
// ============================================================
function initSupabase() {
    const url = localStorage.getItem('sb_url');
    const key = localStorage.getItem('sb_key');
    if (url && key) {
        try { sbClient = supabase.createClient(url, key); return true; }
        catch(e) { return false; }
    }
    return false;
}

async function saveEntry(data) {
    const withDate = { ...data, entry_date: todayStr() };
    if (sbClient) {
        try {
            const { data: row, error } = await sbClient.from('daily_checkins').insert([withDate]).select().single();
            if (!error && row) return { data: row };
            if (error) {
                console.error('Supabase insert error:', error.message);
                showToast('Supabase error — saved locally instead');
            }
        } catch (err) {
            console.error('Supabase exception:', err);
            showToast('Could not reach database — saved locally');
        }
    }
    // Fallback: local storage
    const local = JSON.parse(localStorage.getItem('local_entries') || '[]');
    const row = { ...withDate, id: `local_${Date.now()}`, created_at: new Date().toISOString() };
    local.unshift(row);
    localStorage.setItem('local_entries', JSON.stringify(local));
    return { data: row };
}

async function loadEntries() {
    if (sbClient) {
        try {
            const { data, error } = await sbClient
                .from('daily_checkins').select('*')
                .order('created_at', { ascending: false }).limit(120);
            if (!error && data) { entries = data; return; }
            if (error) {
                console.error('Supabase load error:', error.message);
                showToast('Could not load from Supabase — showing local data');
            }
        } catch (err) {
            console.error('Supabase load exception:', err);
        }
    }
    entries = JSON.parse(localStorage.getItem('local_entries') || '[]');
}

// ============================================================
// HELPERS
// ============================================================
function todayStr() {
    // Use local date (not UTC) — critical for UTC+10 (QLD) users
    const d = new Date();
    return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
}

function formatDate(ds) {
    return new Date(ds + 'T12:00:00').toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
}

function getHour() { return new Date().getHours(); }
function getCheckInType() { return getHour() < 13 ? 'morning' : 'afternoon'; }

function getTodayEntries() {
    const today = todayStr();
    todayEntries.morning = entries.find(e => e.entry_date === today && e.type === 'morning') || null;
    todayEntries.afternoon = entries.find(e => e.entry_date === today && e.type === 'afternoon') || null;
}

function calcAvg(arr, field) {
    const vals = arr.map(e => e[field]).filter(v => v != null && !isNaN(v));
    if (!vals.length) return null;
    return (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1);
}

function getRecentEntries(days) {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
    return entries.filter(e => {
        const ds = e.entry_date || e.created_at?.split('T')[0];
        if (!ds) return false;
        // Parse at noon local to avoid UTC midnight being interpreted as previous day
        return new Date(ds + 'T12:00:00') >= cutoff;
    });
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function navigate(view) {
    const viewEl = document.getElementById(`view-${view}`);
    const navEl = document.querySelector(`[data-view="${view}"]`);
    if (!viewEl || !navEl) { console.warn('navigate: unknown view', view); return; }
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    viewEl.classList.add('active');
    navEl.classList.add('active');
    currentView = view;
    if (view === 'checkin') renderCheckIn();
    if (view === 'insights') renderInsights();
    if (view === 'log') renderLog();
    if (view === 'settings') renderSettings();
}

// ============================================================
// GARMIN SNAPSHOT BUILDER (avoids nested template literals)
// ============================================================
function buildGarminSnap(m) {
    if (!m) return '';
    if (!m.sleep_score && !m.body_battery && !m.steps_yesterday && !m.weight) return '';

    let metrics = '';
    if (m.sleep_score) metrics += '<div class="metric-card" style="flex:1;min-width:70px;"><div class="metric-value" style="font-size:28px;color:#9b7cdb;">' + m.sleep_score + '</div><div class="metric-label">Sleep</div></div>';
    if (m.body_battery) metrics += '<div class="metric-card" style="flex:1;min-width:70px;"><div class="metric-value" style="font-size:28px;">' + m.body_battery + '</div><div class="metric-label">Battery</div></div>';
    if (m.steps_yesterday) metrics += '<div class="metric-card" style="flex:1;min-width:70px;"><div class="metric-value" style="font-size:22px;color:var(--text-2);">' + Number(m.steps_yesterday).toLocaleString() + '</div><div class="metric-label">Steps</div></div>';
    if (m.weight) metrics += '<div class="metric-card" style="flex:1;min-width:70px;"><div class="metric-value" style="font-size:28px;color:var(--positive);">' + m.weight + '</div><div class="metric-label">kg</div></div>';

    let hrv = '';
    if (m.hrv_status || m.recovery_advisory) {
        hrv = '<div style="margin-top:10px;font-size:13px;color:var(--text-2);">';
        if (m.hrv_status) hrv += 'HRV: <strong style="color:var(--text);">' + m.hrv_status + '</strong>';
        if (m.hrv_status && m.recovery_advisory) hrv += ' &nbsp;·&nbsp; ';
        if (m.recovery_advisory) hrv += 'Advisory: <strong style="color:var(--text);">' + m.recovery_advisory + '</strong>';
        hrv += '</div>';
    }

    return '<div class="card" style="margin-bottom:12px;"><h3 style="margin-bottom:12px;">Today&#39;s stats</h3><div style="display:flex;gap:12px;flex-wrap:wrap;">' + metrics + '</div>' + hrv + '</div>';
}

function buildStep(step, index, total) {
    const isLast = index === total - 1;
    let inputHtml = '';

    if (step.type === 'scale') {
        const nextAction = isLast ? 'submitCheckIn()' : 'nextStep()';
        const noteField = step.noteId ? `
            <div id="scale-note-${index}" style="display:none; margin-top:14px;">
                <input type="text" class="text-input" style="margin-top:0;"
                    placeholder="${step.notePlaceholder || 'Add context... (optional)'}"
                    oninput="checkInData['${step.noteId}']=this.value.trim()||null">
            </div>` : '';
        inputHtml = `
            <div class="scale-buttons">
                ${[1,2,3,4,5].map(n => `<button class="scale-btn" onclick="selectScale('${step.id}',${n},this,${index},${isLast})">${n}</button>`).join('')}
            </div>
            ${noteField}
            <div class="nav-row" id="nbtn-${index}" style="display:none;">
                <button class="btn btn-primary" onclick="${nextAction}">${isLast ? 'Submit check-in' : 'Continue'}</button>
            </div>
        `;
    } else if (step.type === 'options') {
        inputHtml = `
            <div class="option-buttons">
                ${step.options.map(o => `
                    <button class="option-btn" onclick="selectOption('${step.id}','${o.value}',this,${index},${isLast})">
                        <span class="opt-icon">${o.icon}</span>
                        <span class="opt-label">${o.label}<div class="opt-sub">${o.sub}</div></span>
                    </button>
                `).join('')}
            </div>
            ${step.skippable ? `
            <div class="nav-row" style="margin-top:10px;">
                <button class="btn btn-ghost" onclick="${isLast ? 'submitCheckIn()' : 'skipAndNext()'}">Skip</button>
            </div>` : ''}
            <div class="nav-row" id="nbtn-${index}" style="display:none;">
                <button class="btn btn-primary" onclick="${isLast ? 'submitCheckIn()' : 'nextStep()'}">Continue</button>
            </div>
        `;
    } else if (step.type === 'number') {
        inputHtml = `
            <input type="number" class="text-input" id="inp-${step.id}"
                   min="${step.min ?? ''}" max="${step.max ?? ''}"
                   placeholder="${step.placeholder}" inputmode="decimal"
                   oninput="checkInData['${step.id}']=this.value.trim()!==''?parseFloat(this.value):null">
            <div class="nav-row">
                <button class="btn btn-primary" onclick="${isLast ? 'submitCheckIn()' : 'nextStep()'}">
                    ${isLast ? 'Submit' : 'Continue'}
                </button>
                ${step.skippable ? `<button class="btn btn-ghost" onclick="${isLast ? 'submitCheckIn()' : 'skipAndNext()'}">Skip</button>` : ''}
            </div>
        `;
    } else if (step.type === 'text') {
        inputHtml = `
            <input type="text" class="text-input" id="inp-${step.id}"
                   placeholder="${step.placeholder || ''}"
                   oninput="checkInData['${step.id}']=this.value.trim()||null">
            <div class="nav-row">
                <button class="btn btn-primary" onclick="${isLast ? 'submitCheckIn()' : 'nextStep()'}">
                    ${isLast ? 'Submit' : 'Continue'}
                </button>
                ${step.skippable ? `<button class="btn btn-ghost" onclick="${isLast ? 'submitCheckIn()' : 'skipAndNext()'}">Skip</button>` : ''}
            </div>
        `;
    } else if (step.type === 'textarea') {
        inputHtml = `
            <textarea class="text-input" id="inp-${step.id}" rows="3"
                      placeholder="${step.placeholder || ''}"
                      oninput="checkInData['${step.id}']=this.value.trim()||null"></textarea>
            <div class="nav-row">
                <button class="btn btn-primary" onclick="submitCheckIn()">Submit check-in</button>
                ${step.skippable ? `<button class="btn btn-ghost" onclick="submitCheckIn()">Skip &amp; submit</button>` : ''}
            </div>
        `;
    }

    return `<div class="step" id="step-${index}"><p class="question-label">${step.question}</p>${step.sub ? `<p class="question-sub">${step.sub}</p>` : ''}${inputHtml}</div>`;
}

function showStep(i) {
    const steps = checkInType === 'morning' ? morningSteps : afternoonSteps;
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    const el = document.getElementById(`step-${i}`);
    if (el) {
        el.classList.add('active');
        const inp = el.querySelector('input, textarea');
        if (inp) setTimeout(() => inp.focus(), 150);
    }
    const fill = document.getElementById('pfill');
    if (fill) fill.style.width = `${((i + 1) / steps.length) * 100}%`;
}

function selectScale(field, val, btn, stepIdx, isLast) {
    checkInData[field] = val;
    btn.closest('.scale-buttons').querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    // Show note field if present
    const noteEl = document.getElementById(`scale-note-${stepIdx}`);
    if (noteEl) {
        noteEl.style.display = 'block';
        const inp = noteEl.querySelector('input');
        if (inp) setTimeout(() => inp.focus(), 120);
    }
    const nb = document.getElementById(`nbtn-${stepIdx}`);
    if (nb) nb.style.display = 'flex';
}

function selectOption(field, val, btn, stepIdx, isLast) {
    checkInData[field] = val;
    btn.closest('.option-buttons').querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    setTimeout(() => {
        if (!isLast) nextStep();
        else {
            const nb = document.getElementById(`nbtn-${stepIdx}`);
            if (nb) nb.style.display = 'flex';
        }
    }, 320);
}

function nextStep() {
    const steps = checkInType === 'morning' ? morningSteps : afternoonSteps;
    if (checkInStep < steps.length - 1) { checkInStep++; showStep(checkInStep); }
}

function skipAndNext() {
    const steps = checkInType === 'morning' ? morningSteps : afternoonSteps;
    checkInData[steps[checkInStep].id] = null;
    nextStep();
}

function forceCheckIn(type) {
    checkInType = type;
    checkInStep = 0;
    checkInData = {};
    const el = document.getElementById('view-checkin');
    const steps = type === 'morning' ? morningSteps : afternoonSteps;
    const hour = getHour();
    const greeting = hour < 12 ? 'Good morning.' : hour < 17 ? 'Good afternoon.' : 'Good evening.';
    const dayStr = new Date().toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });
    el.innerHTML = `
        <div style="margin-bottom: 24px;">
            <div class="checkin-badge">${type === 'morning' ? '☀' : '🌤'} ${type.toUpperCase()} CHECK-IN</div>
            <h1>${greeting}</h1>
            <p style="color:var(--text-2);font-size:14px;margin-top:5px;">${dayStr}</p>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="pfill" style="width:${100/steps.length}%"></div></div>
        <div id="steps">${steps.map((s, i) => buildStep(s, i, steps.length)).join('')}</div>
    `;
    showStep(0);
}

let submitInProgress = false;
async function submitCheckIn() {
    if (submitInProgress) return;
    if (!checkInData.mood || !checkInData.energy) {
        showToast('Mood and energy are required'); return;
    }
    submitInProgress = true;
    try {
        const { data } = await saveEntry({ type: checkInType, ...checkInData });
        if (data) entries.unshift(data);
        renderComplete(checkInData);
        showToast(sbClient ? 'Saved ✓' : 'Saved locally ✓');
    } catch(e) {
        showToast('Saved locally (connect Supabase in Setup to sync)');
        renderComplete(checkInData);
    } finally {
        submitInProgress = false;
    }
}

function renderInsights() {
    const el = document.getElementById('view-insights');
    if (entries.length < 2) {

                <p>Do your daily check-ins for a week or two and your patterns will show up here — mood vs cycle phase, movement impact, day trajectory. The good stuff.</p>
            </div>

        return;
    }

    const last14 = getRecentEntries(14);
    const last30 = getRecentEntries(30);

    const avgMood = calcAvg(last14, 'mood');
    const avgEnergy = calcAvg(last14, 'energy');
    // Only count entries that have a movement value — morning check-ins and quicklogs
    // never have movement data and must be excluded from the denominator
    const movementEntries = last14.filter(e => e.movement != null);
    const moveDays = movementEntries.filter(e => e.movement === 'yes' || e.movement === 'a_bit').length;
    const moveRate = movementEntries.length > 0 ? Math.round((moveDays / movementEntries.length) * 100) : 0;

    // Movement vs mood
    const withMove = last30.filter(e => e.movement === 'yes' || e.movement === 'a_bit');
    const noMove = last30.filter(e => e.movement === 'no');
    const moodMove = calcAvg(withMove, 'mood');
    const moodNoMove = calcAvg(noMove, 'mood');

    // Work completion rate
    const workEntries = last14.filter(e => e.work_status);
    const workDone = workEntries.filter(e => e.work_status === 'done').length;
    const workRate = workEntries.length >= 3 ? Math.round((workDone / workEntries.length) * 100) : null;

    // Morning vs afternoon mood delta
    const amMood = calcAvg(last14.filter(e => e.type === 'morning'), 'mood');
    const pmMood = calcAvg(last14.filter(e => e.type === 'afternoon'), 'mood');
    const delta = amMood && pmMood ? (parseFloat(pmMood) - parseFloat(amMood)).toFixed(1) : null;

    // Latest cycle phase

    const phase = lastCycle ? getCyclePhase(lastCycle.cycle_day) : null;

    el.innerHTML = `
        <h2 style="margin-bottom:4px;">Your patterns</h2>
        <p style="color:var(--text-2);font-size:13px;margin-bottom:16px;">${entries.length} entries logged</p>

        <div class="card" style="margin-bottom:20px;">

            <button class="btn btn-primary" onclick="runWeeklySynthesis()" style="width:auto;padding:12px 20px;">Generate weekly read</button>
            <div id="synthesis-result"></div>
        </div>

        ${phase ? `
        <div class="phase-card" style="--phase-glow:${phase.glow}; margin-bottom:16px;">
            <h3>Current phase</h3>
            <div class="phase-name" style="color:${phase.color};">${phase.name}</div>
            <div class="phase-desc">${phase.desc}</div>
        </div>` : ''}

        <div class="metric-row">
            <div class="metric-card">
                <div class="metric-value">${avgMood || '–'}</div>
                <div class="metric-label">Avg Mood<br>14 days</div>
            </div>
            <div class="metric-card">
                <div class="metric-value">${avgEnergy || '–'}</div>
                <div class="metric-label">Avg Energy<br>14 days</div>
            </div>
            <div class="metric-card">
                <div class="metric-value">${moveRate}%</div>
                <div class="metric-label">Days with<br>Movement</div>
            </div>
        </div>

        <div class="card">
            <h3>Mood &amp; energy — last 14 days</h3>
            <div class="chart-wrap"><canvas id="trend-chart"></canvas></div>
        </div>

        ${workRate !== null ? `
        <div class="card">
            <h3>Work intentions</h3>
            <div style="display:flex;align-items:baseline;gap:8px;margin-top:12px;">
                <span style="font-family:var(--font-display);font-size:42px;font-weight:300;color:var(--accent);">${workRate}%</span>

        ${moodMove && moodNoMove && withMove.length >= 3 && noMove.length >= 3 ? `

function renderTrendChart() {
    const canvas = document.getElementById('trend-chart');
    if (!canvas) return;
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

    const last14 = getRecentEntries(14);
    if (!last14.length) return;

    const byDate = {};
    last14.forEach(e => {
        const d = e.entry_date || e.created_at?.split('T')[0];
        if (!d) return; // skip entries with no date
        if (!byDate[d]) byDate[d] = { moods: [], energies: [] };
        if (e.mood) byDate[d].moods.push(e.mood);
        if (e.energy) byDate[d].energies.push(e.energy);
    });

    const dates = Object.keys(byDate).sort();
    const labels = dates.map(d => new Date(d + 'T12:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }));
    const moods = dates.map(d => { const m = byDate[d].moods; return m.length ? +(m.reduce((a,b)=>a+b,0)/m.length).toFixed(1) : null; });
    const energies = dates.map(d => { const e = byDate[d].energies; return e.length ? +(e.reduce((a,b)=>a+b,0)/e.length).toFixed(1) : null; });

    chartInstance = new Chart(canvas, {
        type: 'line',
        data: {
            labels,
            datasets: [
                { label: 'Mood', data: moods, borderColor: '#e8940a', backgroundColor: 'rgba(232,148,10,0.08)', borderWidth: 2, pointRadius: 3.5, pointBackgroundColor: '#e8940a', tension: 0.4, fill: true, spanGaps: true },
                { label: 'Energy', data: energies, borderColor: '#5caa6f', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 3.5, pointBackgroundColor: '#5caa6f', tension: 0.4, fill: false, spanGaps: true }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: '#9a9480', font: { size: 11, family: 'Plus Jakarta Sans' }, boxWidth: 10, padding: 14 } },
                tooltip: { backgroundColor: '#242418', borderColor: 'rgba(240,220,160,0.12)', borderWidth: 1, titleColor: '#f0e8d0', bodyColor: '#9a9480', padding: 10 }
            },
            scales: {
                x: { ticks: { color: '#4a4840', font: { size: 10 }, maxTicksLimit: 7 }, grid: { color: 'rgba(240,220,160,0.03)' } },
                y: { min: 0, max: 5.5, ticks: { color: '#4a4840', font: { size: 10 }, stepSize: 1, callback: v => v <= 5 ? v : '' }, grid: { color: 'rgba(240,220,160,0.03)' } }
            }
        }
    });
}

function renderLog() {

        return;
    }

    const byDate = {};
    entries.forEach(e => {
        const d = e.entry_date || e.created_at?.split('T')[0];
        if (!d) return; // skip entries with no recoverable date
        if (!byDate[d]) byDate[d] = [];
        byDate[d].push(e);
    });

    const sorted = Object.keys(byDate).sort().reverse();
    el.innerHTML = `
        <h2 style="margin-bottom:20px;">Your log</h2>
        ${sorted.map(d => `
            <div class="section-header"><h3>${formatDate(d)}</h3></div>
            ${byDate[d].sort((a,b)=>{
                const order = {morning:0,afternoon:1,quicklog:2};
                return (order[a.type]??2)-(order[b.type]??2);
            }).map(buildLogEntry).join('')}
        `).join('')}
    `;
}

function buildLogEntry(e) {
    // Quick log entries
    const entryId = e.id || '';
    if (e.type === 'quicklog') {
        const lines = (e.note||'').split('\n');
        const bubbles = lines.map(l => {
            if (!l.trim()) return '';
            const isNik = l.startsWith('Nik:');
            const isCoach = l.startsWith('Coach:');
            const rawText = l.replace(/^(Nik:|Coach:)\s*/, '');
            if (!rawText) return '';
            const safe = esc(rawText);
            if (isNik) return `<div style="font-size:13px;color:var(--text-2);margin-bottom:4px;padding-left:8px;border-left:2px solid rgba(232,148,10,0.3);">${safe}</div>`;
            if (isCoach) return `<div style="font-size:13px;color:var(--text);margin-bottom:4px;font-weight:500;">${safe}</div>`;
            return `<div style="font-size:13px;color:var(--text-2);margin-bottom:4px;">${safe}</div>`;
        }).join('');
        return `
            <div class="log-entry">
                <div class="log-entry-header">
                    <span class="type-badge" style="background:rgba(155,124,219,0.15);color:#9b7cdb;">⚡ Quick log</span>
                    <button onclick="deleteEntry('${entryId}')" style="background:none;border:none;color:var(--text-3);font-size:16px;cursor:pointer;padding:4px 6px;border-radius:6px;" title="Delete">✕</button>
                </div>
                ${bubbles}
            </div>`;
    }
    const bLabels = { checked_in: 'Checked in', drifted: 'Drifted', autopilot: 'Autopilot' };
    const mLabels = { yes: '↑ Movement', a_bit: '→ A bit', no: '— No movement' };
    const wLabels = { done: '✓ Done', in_progress: '~ In progress', didnt_happen: '— Didn\'t happen' };
    const fLabels = { on_target: '→ On target', scattered: '~ Scattered', hyperfocused: '⬤ Hyperfocused', checked_out: '— Checked out' };
    return `
        <div class="log-entry">
            <div class="log-entry-header">
                <span class="type-badge ${e.type}">${e.type === 'morning' ? '☀ Morning' : '🌤 Afternoon'}</span>
                <div style="display:flex;align-items:center;gap:10px;">
                    ${e.cycle_day ? `<span style="font-size:12px;color:var(--text-2);">Day ${e.cycle_day}</span>` : ''}
                    <button onclick="editEntry('${entryId}')" style="background:none;border:none;color:var(--text-2);font-size:15px;cursor:pointer;padding:4px 6px;border-radius:6px;" title="Edit">✎</button>
                    <button onclick="deleteEntry('${entryId}')" style="background:none;border:none;color:var(--text-3);font-size:16px;cursor:pointer;padding:4px 6px;border-radius:6px;" title="Delete">✕</button>
                </div>
            </div>
            ${(e.sleep_score || e.body_battery || e.hrv_status || e.steps_yesterday || e.weight) ? `
            <div class="me-row" style="margin-bottom:8px;flex-wrap:wrap;gap:12px;">
                ${e.sleep_score ? `<div class="me-stat"><span>Sleep</span><strong style="color:#9b7cdb;">${e.sleep_score}</strong></div>` : ''}
                ${e.body_battery ? `<div class="me-stat"><span>Battery</span><strong style="color:#e8940a;">${e.body_battery}</strong></div>` : ''}
                ${e.steps_yesterday ? `<div class="me-stat"><span>Steps</span><strong style="color:var(--text-2);">${Number(e.steps_yesterday).toLocaleString()}</strong></div>` : ''}
                ${e.weight ? `<div class="me-stat"><span>Weight</span><strong style="color:var(--positive);">${e.weight}kg</strong></div>` : ''}
                ${e.hrv_status ? `<div class="me-stat"><span>HRV</span><strong style="color:var(--text-2);font-size:13px;font-family:var(--font-body);">${e.hrv_status}</strong></div>` : ''}
                ${e.recovery_advisory ? `<div class="me-stat"><span>Recovery</span><strong style="color:var(--text-2);font-size:13px;font-family:var(--font-body);">${e.recovery_advisory}</strong></div>` : ''}
            </div>` : ''}
            <div class="me-row">
                <div class="me-stat"><span>Mood</span><strong style="color:var(--accent);">${e.mood}</strong></div>
                <div class="me-stat"><span>Energy</span><strong style="color:var(--positive);">${e.energy}</strong></div>
            </div>
            ${e.mood_note ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:3px;font-style:italic;">"${esc(e.mood_note)}"</div>` : ''}
            ${e.energy_note ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:6px;font-style:italic;">"${esc(e.energy_note)}"</div>` : ''}
            ${e.focus_quality ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:3px;">${fLabels[e.focus_quality]||e.focus_quality}</div>` : ''}
            ${e.body_awareness ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:3px;">${bLabels[e.body_awareness]||e.body_awareness}</div>` : ''}
            ${e.movement ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:3px;">${mLabels[e.movement]||e.movement}</div>` : ''}

        </div>
    `;
}

function saveSupabaseConfig() {
    const url = document.getElementById('sb-url').value.trim();
    const key = document.getElementById('sb-key').value.trim();
    if (!url || !key) { showToast('Enter both URL and key'); return; }
    localStorage.setItem('sb_url', url);
    localStorage.setItem('sb_key', key);
    if (initSupabase()) {
        showToast('Connected ✓');
        loadEntries().then(() => renderSettings());
    } else {
        showToast('Could not connect — check your details');
    }
}

async function requestNotifications() {
    if (!('Notification' in window)) { showToast('Not supported in this browser'); return; }
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
        scheduleNotifications();
        showToast('Notifications enabled ✓');
        renderSettings();
    } else {
        showToast('Permission denied — check your browser settings');
    }
}

function scheduleNotifications() {
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({ type: 'SCHEDULE' });
    }
}

async function exportData() {
    let dataToExport;
    if (sbClient) {
        // Export from Supabase when connected
        const { data, error } = await sbClient
            .from('daily_checkins').select('*')
            .order('created_at', { ascending: false });
        if (error || !data) {
            showToast('Export failed — try again');
            return;
        }
        dataToExport = JSON.stringify(data, null, 2);
        showToast('Exporting from Supabase...');
    } else {
        dataToExport = localStorage.getItem('local_entries') || '[]';
        showToast('Exporting local data...');
    }
    const blob = new Blob([dataToExport], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `daily-os-${todayStr()}.json`;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 60000);
}

function clearLocal() {
    if (confirm('Clear locally stored entries? Data already synced to Supabase is not affected.')) {
        localStorage.removeItem('local_entries');
        if (sbClient) {
            loadEntries().then(() => {
                if (currentView === 'log') renderLog();
                if (currentView === 'checkin') renderCheckIn();
            });
            showToast('Local data cleared — reloading from Supabase');
        } else {
            entries = [];
            showToast('Local data cleared');
            if (currentView === 'log') renderLog();
            if (currentView === 'checkin') renderCheckIn();
        }
    }
}

async function deleteEntry(id) {
    if (!id) { showToast("Can't delete this entry"); return; }
    if (!confirm('Delete this entry?')) return;

    if (id.startsWith('local_') || id.startsWith('saved_')) {
        const local = JSON.parse(localStorage.getItem('local_entries') || '[]');
        localStorage.setItem('local_entries', JSON.stringify(local.filter(e => e.id !== id)));
    } else if (sbClient) {
        const { error } = await sbClient.from('daily_checkins').delete().eq('id', id);
        if (error) { showToast('Could not delete — try again'); return; }
    } else {
        showToast('Not connected to database — cannot delete');
        return;
    }

    entries = entries.filter(e => e.id !== id);
    showToast('Deleted');
    if (currentView === 'log') renderLog();
    if (currentView === 'checkin') renderCheckIn();
}

let synthesisRunning = false;

async function runWeeklySynthesis() {
    if (synthesisRunning) return;
    synthesisRunning = true;
    const el = document.getElementById('synthesis-result');
    if (!el) { synthesisRunning = false; return; }
    el.innerHTML = '<div class="bubble-thinking" style="display:inline-flex;padding:14px 18px;border-radius:12px;background:var(--surface-2);margin-top:16px;"><div class="dot-pulse"><span></span><span></span><span></span></div></div>';

    const last7 = getRecentEntries(7);
    if (last7.length < 2) {
        el.innerHTML = '<p style="color:var(--text-2);font-size:14px;margin-top:16px;">Not enough data yet — keep logging for a few more days.</p>';
        synthesisRunning = false;
        return;
    }

    const dataText = last7.map(e => {
        const parts = [`[${e.entry_date} ${e.type}]`];
        if (e.mood) parts.push(`mood:${e.mood}`);
        if (e.energy) parts.push(`energy:${e.energy}`);
        if (e.mood_note) parts.push(`mood note:"${e.mood_note}"`);
        if (e.energy_note) parts.push(`energy note:"${e.energy_note}"`);
        if (e.focus_quality) parts.push(`focus:${e.focus_quality}`);
        if (e.body_awareness) parts.push(`food:${e.body_awareness}`);
        if (e.movement) parts.push(`movement:${e.movement}`);
        if (e.work_status) parts.push(`work:${e.work_status}`);
        if (e.work_intention) parts.push(`intention:"${e.work_intention}"`);
        if (e.sleep_score) parts.push(`sleep:${e.sleep_score}`);
        if (e.body_battery) parts.push(`battery:${e.body_battery}`);
        if (e.hrv_status) parts.push(`hrv:${e.hrv_status}`);
        if (e.recovery_advisory) parts.push(`recovery:${e.recovery_advisory}`);
        if (e.steps_yesterday) parts.push(`steps:${e.steps_yesterday}`);
        if (e.weight) parts.push(`weight:${e.weight}kg`);
        if (e.cycle_day) parts.push(`cycle_day:${e.cycle_day}`);
        if (e.note) parts.push(`note:"${e.note}"`);
        return parts.join(' ');
    }).join('\n');

    const customContext = (aboutMe ? `\n\nUser context: ${aboutMe}` : '') + getProfileContext();
    const systemPrompt = `You are a personal behaviour coach analysing a week of tracking data for Nik, a 37-year-old woman in Agnes Water, Queensland.

About Nik: ADHD, autism, binge eating disorder, PMDD, depression, hypersensitivity/anxiety. On Ozempic, Prozac, Vyvanse. Runs her own business. Goals: weight loss, fitness, business consistency, better habits.${customContext}

Analyse the data below and give Nik a genuine, useful weekly read. Structure it as:

**What I'm seeing** (2-3 sentences — actual patterns, not summaries. Connect dots. Reference specific data points.)

**The thing worth paying attention to** (1-2 sentences — the most important signal in this week's data)

**One thing to try this week** (1 sentence — specific, small, evidence-based. Not generic advice.)

Be direct. No fluff. No "great job logging!" No bullet points within sections. Write like a smart mate who knows the research, not a wellness app.`;

    try {
        const res = await fetch('/.netlify/functions/claude', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                system: systemPrompt,
                messages: [{ role: 'user', content: `Here is my last 7 days of data:\n\n${dataText}\n\nGive me my weekly read.` }],
                max_tokens: 400
            })
        });
        if (!res.ok) throw new Error('Function returned ' + res.status);
        const data = await res.json();
        if (!data.content) throw new Error('Unexpected response shape');
        const text = data.content[0]?.text || 'Could not generate synthesis.';

        // Escape raw text first, then apply markdown transforms safely
        const safeText = text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
        const rendered = safeText
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n\n/g, '</p><p style="margin-top:14px;">')
            .replace(/\n/g, '<br>');

        el.innerHTML = `<div style="margin-top:16px;background:var(--surface-2);border-radius:14px;padding:18px;border:1px solid var(--border);font-size:14px;line-height:1.7;color:var(--text);"><p>${rendered}</p></div>
        <p style="font-size:11px;color:var(--text-3);margin-top:10px;">Based on ${last7.length} entries from the last 7 days</p>`;
    } catch(e) {
        el.innerHTML = '<p style="color:var(--text-2);font-size:14px;margin-top:16px;">Could not connect — check your internet and try again.</p>';
    } finally {
        synthesisRunning = false;
    }
}

let qlConversation = [];   // {role, content}
let qlFollowUpCount = 0;
let qlDone = false;
let qlSaving = false;
let qlFetching = false;

function openQuickLog() {
    qlConversation = [];
    qlFollowUpCount = 0;
    qlDone = false;
    qlFetching = false;  // reset in case modal was closed mid-fetch
    qlSaving = false;    // reset in case modal was closed mid-save
    document.getElementById('ql-modal').style.display = 'flex';
    document.getElementById('ql-body').innerHTML = '';
    document.getElementById('ql-input').value = '';
    document.getElementById('ql-input').style.height = 'auto';
    document.getElementById('ql-send').disabled = true;
    document.getElementById('ql-input-row').style.display = 'flex';
    document.getElementById('ql-input').placeholder = "What's going on? (voice or type)";
    setTimeout(() => document.getElementById('ql-input').focus(), 300);
}

function closeQuickLog() {
    document.getElementById('ql-modal').style.display = 'none';
    qlConversation = [];
}

function addBubble(text, type) {
    const body = document.getElementById('ql-body');
    const div = document.createElement('div');
    div.className = `bubble bubble-${type}`;
    div.textContent = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
    return div;
}

function addThinking() {
    const body = document.getElementById('ql-body');
    const div = document.createElement('div');
    div.className = 'bubble bubble-thinking';
    div.id = 'ql-thinking';
    div.innerHTML = '<div class="dot-pulse"><span></span><span></span><span></span></div>';
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
}

function removeThinking() {
    const t = document.getElementById('ql-thinking');
    if (t) t.remove();
}

async function sendQL() {
    const input = document.getElementById('ql-input');
    const text = input.value.trim();
    if (!text || qlSaving || qlFetching) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('ql-send').disabled = true;

    addBubble(text, 'user');
    qlConversation.push({ role: 'user', content: text });

    if (qlDone) return;

    qlFetching = true;
    addThinking();
    const reply = await getQLResponse();
    removeThinking();
    qlFetching = false;

    if (reply) {
        if (reply.type === 'question') {
            addBubble(reply.text, 'ai');
            qlConversation.push({ role: 'assistant', content: reply.text });
            qlFollowUpCount++;
            input.placeholder = 'Reply...';
            setTimeout(() => input.focus(), 200);
        } else if (reply.type === 'done') {
            addBubble(reply.text, 'ai');
            qlConversation.push({ role: 'assistant', content: reply.text });
            if (reply.action) {
                const actionDiv = document.createElement('div');
                actionDiv.className = 'bubble bubble-action';
                actionDiv.innerHTML = '<strong>One thing:</strong> ' + esc(reply.action);
                document.getElementById('ql-body').appendChild(actionDiv);
                document.getElementById('ql-body').scrollTop = document.getElementById('ql-body').scrollHeight;
            }
            qlDone = true;
            document.getElementById('ql-input-row').style.display = 'none';
            await saveQuickLog();
            setTimeout(() => {
                if (currentView === 'log') renderLog();
            }, 400);
        }
    }
}

function buildQLSystemPrompt() {
    const recent = getRecentEntries(14);
    const recentSummary = recent.slice(0, 10).map(e => {
        const parts = [`[${e.entry_date} ${e.type}] mood:${e.mood} energy:${e.energy}`];
        if (e.energy_note) parts.push(`energy note: "${e.energy_note}"`);
        if (e.mood_note) parts.push(`mood note: "${e.mood_note}"`);
        if (e.focus_quality) parts.push(`focus: ${e.focus_quality}`);
        if (e.body_awareness) parts.push(`food: ${e.body_awareness}`);
        if (e.movement) parts.push(`movement: ${e.movement}`);
        if (e.note) parts.push(`note: "${e.note}"`);
        return parts.join(', ');
    }).join('\n');

    const lastCycle = recent.find(e => e.cycle_day);
    const phaseInfo = lastCycle ? `Current cycle day approximately ${lastCycle.cycle_day} (logged ${lastCycle.entry_date})` : 'Cycle day unknown';

    const customContext = (aboutMe ? `\n\nAdditional context (user-provided):\n${aboutMe}` : '') + getProfileContext();
    return `You are a personal behaviour coach inside a daily tracking app for Nik, a 37-year-old woman in Agnes Water, Queensland.

About Nik:
- ADHD, autism, binge eating disorder, hyphenxiety (hypersensitivity/anxiety), depression, suspected PMDD
- On Ozempic (weight management), Prozac (daily), Vyvanse (ADHD/BED)
- Runs her own marketing consultancy. Working on weight loss, fitness, business consistency
- Smart, direct, no-nonsense. Hates being patronised. Voice-to-text user so replies may be casual/rough
- ${phaseInfo}${customContext}

Recent check-in data:
${recentSummary || 'No recent data yet'}

Your job when Nik logs something:
1. Ask ONE short follow-up question to understand what drove the behaviour. Be specific, not generic. Max 15 words per question.
2. After max 2 follow-ups, wrap up with: a brief pattern observation (1-2 sentences max, factual not preachy), then ONE concrete small action she could take.
3. Keep it warm but direct. No lecturing. No paragraphs. No "that's great!" or "I hear you."
4. Connect to her recent data when relevant — e.g. "this is the third time this week."

Respond ONLY as valid JSON in this exact format:
For a follow-up question: {"type":"question","text":"Your question here"}
For the final wrap-up: {"type":"done","text":"Pattern observation here.","action":"One concrete small action here"}

No other text. Only the JSON object.`;
}

async function getQLResponse() {
    const maxFollowUps = 2;
    const isWrapUp = qlFollowUpCount >= maxFollowUps;

    const messages = [...qlConversation];
    if (isWrapUp) {
        messages.push({ role: 'user', content: '[Wrap up now with your pattern observation and one action]' });
    }

    try {
        const res = await fetch('/.netlify/functions/claude', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                system: buildQLSystemPrompt(),
                messages
            })
        });
        if (!res.ok) throw new Error('Function returned ' + res.status);
        const data = await res.json();
        if (!data.content) throw new Error('Unexpected response shape');
        const raw = data.content[0]?.text || '';
        const clean = raw.replace(/```json|```/g, '').trim();
        return JSON.parse(clean);
    } catch(e) {
        console.error('QL error:', e);
        return { type: 'done', text: 'Logged.', action: null };
    }
}

async function saveQuickLog() {
    if (qlSaving) return;
    qlSaving = true;
    const logText = qlConversation.map(m => `${m.role === 'user' ? 'Nik' : 'Coach'}: ${m.content}`).join('\n');
    const entry = {
        entry_date: todayStr(),
        type: 'quicklog',
        mood: null,
        energy: null,
        note: logText
    };

    try {
        if (sbClient) {
            const { data: row, error } = await sbClient
                .from('daily_checkins').insert([entry]).select().single();
            if (!error && row) {
                entries.unshift(row);
                qlSaving = false;
                return;
            }
            console.error('Supabase quicklog save error:', error?.message);
        }
        // Fallback or non-Supabase path
        const local = JSON.parse(localStorage.getItem('local_entries') || '[]');
        const localRow = { ...entry, id: `local_${Date.now()}`, created_at: new Date().toISOString() };
        local.unshift(localRow);
        localStorage.setItem('local_entries', JSON.stringify(local));
        entries.unshift(localRow);
    } catch(e) {
        console.error('Save error:', e);
    }
    qlSaving = false;
}

function renderEditModal(e) {
    const body = document.getElementById('edit-modal-body');
    const isMorning = e.type === 'morning';

    // Helper builders — all inline to avoid variable-name clashes with outer scope
    const numField = (label, key, val, min, max) =>
        `<div class="edit-field"><label class="edit-label">${label}</label>` +
        `<input type="number" class="text-input" style="margin-top:4px;" min="${min ?? ''}" max="${max ?? ''}" inputmode="decimal"` +
        ` value="${val ?? ''}" placeholder="(optional)"` +
        ` oninput="editingData['${key}']=this.value.trim()!==''?parseFloat(this.value):null"></div>`;

    const textField = (label, key, val) =>
        `<div class="edit-field"><label class="edit-label">${label}</label>` +
        `<input type="text" class="text-input" style="margin-top:4px;" value="${esc(val || '')}" placeholder="(optional)"` +
        ` oninput="editingData['${key}']=this.value.trim()||null"></div>`;

    const textareaField = (label, key, val) =>
        `<div class="edit-field"><label class="edit-label">${label}</label>` +
        `<textarea class="text-input" rows="3" style="margin-top:4px;" placeholder="(optional)"` +
        ` oninput="editingData['${key}']=this.value.trim()||null">${esc(val || '')}</textarea></div>`;

    const scaleField = (label, key, val) => {
        const btns = [1,2,3,4,5].map(n =>
            `<button class="edit-scale-btn${val==n?' selected':''}"` +
            ` onclick="this.parentNode.querySelectorAll('.edit-scale-btn').forEach(b=>b.classList.remove('selected'));` +
            `this.classList.add('selected');editingData['${key}']=${n};">${n}</button>`
        ).join('');
        return `<div class="edit-field"><label class="edit-label">${label}</label><div class="edit-scale-row">${btns}</div></div>`;
    };

    const selField = (label, key, val, opts) => {
        const options = opts.map(o => `<option value="${o.v}"${val===o.v?' selected':''}>${o.l}</option>`).join('');
        return `<div class="edit-field"><label class="edit-label">${label}</label>` +
            `<select class="edit-select" onchange="editingData['${key}']=this.value||null">${options}</select></div>`;
    };

    let h = '';

    if (isMorning) {
        h += numField('Cycle day', 'cycle_day', e.cycle_day, 1, 35);
        h += numField('Sleep score (0–100)', 'sleep_score', e.sleep_score, 0, 100);
        h += numField('Body battery (0–100)', 'body_battery', e.body_battery, 0, 100);
        h += selField('HRV status', 'hrv_status', e.hrv_status, [
            {v:'',l:'(skip)'},{v:'poor',l:'Poor'},{v:'low',l:'Low'},
            {v:'balanced',l:'Balanced'},{v:'good',l:'Good'}]);
        h += selField('Recovery advisory', 'recovery_advisory', e.recovery_advisory, [
            {v:'',l:'(skip)'},{v:'recover',l:'Recover'},{v:'maintain',l:'Maintain'},{v:'push',l:'Push'}]);
        h += numField('Steps yesterday', 'steps_yesterday', e.steps_yesterday, 0, null);
        h += numField('Weight (kg)', 'weight', e.weight, 30, 300);
    }

    h += scaleField('Mood', 'mood', e.mood);
    h += textField('Mood note', 'mood_note', e.mood_note);
    h += scaleField('Energy', 'energy', e.energy);
    h += textField('Energy note', 'energy_note', e.energy_note);

    if (isMorning) {
        h += textField('Work intention', 'work_intention', e.work_intention);
        h += textField('Body intention', 'body_intention', e.body_intention);
    } else {
        h += selField('Focus quality', 'focus_quality', e.focus_quality, [
            {v:'',l:'(skip)'},{v:'on_target',l:'On target'},{v:'scattered',l:'Scattered'},
            {v:'hyperfocused',l:'Hyperfocused'},{v:'checked_out',l:'Checked out'}]);
        h += selField('Food awareness', 'body_awareness', e.body_awareness, [
            {v:'',l:'(skip)'},{v:'checked_in',l:'Checked in'},{v:'drifted',l:'Drifted'},{v:'autopilot',l:'Autopilot'}]);
        h += selField('Movement', 'movement', e.movement, [
            {v:'',l:'(skip)'},{v:'yes',l:'Yes, properly'},{v:'a_bit',l:'A bit'},{v:'no',l:'Not today'}]);
        h += selField('Work status', 'work_status', e.work_status, [
            {v:'',l:'(skip)'},{v:'done',l:'Done'},{v:'in_progress',l:'In progress'},{v:'didnt_happen',l:"Didn't happen"}]);
        h += textareaField('Notes', 'note', e.note);
    }

    body.innerHTML = h;
}

async function saveEditedEntry() {
    if (!editingId) return;
    if (!editingData.mood || !editingData.energy) { showToast('Mood and energy are required'); return; }
    const btn = document.getElementById('edit-save-btn');
    if (btn) btn.disabled = true;

    // Never overwrite immutable fields
    const toSave = { ...editingData };
    delete toSave.id;
    delete toSave.created_at;
    delete toSave.entry_date;

    try {
        if (editingId.startsWith('local_') || editingId.startsWith('saved_')) {
            const local = JSON.parse(localStorage.getItem('local_entries') || '[]');
            const idx = local.findIndex(e => e.id === editingId);
            if (idx !== -1) {
                local[idx] = { ...local[idx], ...toSave };
                localStorage.setItem('local_entries', JSON.stringify(local));
            } else {
                showToast('Entry not found in local storage');
                if (btn) btn.disabled = false;
                return;
            }
        } else if (sbClient) {
            const { error } = await sbClient.from('daily_checkins').update(toSave).eq('id', editingId);
            if (error) { showToast('Could not save — try again'); if (btn) btn.disabled = false; return; }
        } else {
            showToast('Not connected — cannot save edit');
            if (btn) btn.disabled = false;
            return;
        }
        // Update in-memory array
        const idx = entries.findIndex(e => e.id === editingId);
        if (idx !== -1) entries[idx] = { ...entries[idx], ...toSave };

        showToast('Saved ✓');
        closeEditModal();
        if (currentView === 'log') renderLog();
        if (currentView === 'checkin') { getTodayEntries(); renderCheckIn(); }
    } catch(err) {
        console.error('Edit save error:', err);
        showToast('Something went wrong');
    } finally {
        if (btn) btn.disabled = false;
    }
}

// ============================================================
// INIT
// ============================================================
async function init() {
    if ('serviceWorker' in navigator) {
        try { await navigator.serviceWorker.register('/sw.js'); } catch(e) {}
    }
    initSupabase();
    aboutMe = localStorage.getItem('about_me') || '';
    await loadEntries();
    renderCheckIn();
    if (Notification?.permission === 'granted') setTimeout(scheduleNotifications, 1000);
}

init();
</script>
