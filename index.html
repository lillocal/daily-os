<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121210">
    <title>Daily OS</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #121210;
            --surface: #1c1c16;
            --surface-2: #242418;
            --border: rgba(240, 220, 160, 0.08);
            --text: #f0e8d0;
            --text-2: #9a9480;
            --text-3: #4a4840;
            --accent: #e8940a;
            --accent-dim: rgba(232, 148, 10, 0.12);
            --positive: #5caa6f;
            --negative: #cc5555;
            --font-display: 'Fraunces', Georgia, serif;
            --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
            --nav-height: 72px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 16px;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .view {
            display: none;
            padding: 24px 20px calc(var(--nav-height) + env(safe-area-inset-bottom, 0px) + 16px);
            min-height: 100vh;
            min-height: 100dvh;
        }
        .view.active { display: block; }

        /* Bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            height: calc(var(--nav-height) + env(safe-area-inset-bottom, 0px));
            background: rgba(24, 24, 18, 0.96);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            padding-top: 10px;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 6px 0;
            color: var(--text-3);
            transition: color 0.2s;
            user-select: none;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 22px; height: 22px; }
        .nav-item span { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }

        /* Type */
        h1 { font-family: var(--font-display); font-size: 34px; font-weight: 300; line-height: 1.1; letter-spacing: -0.02em; }
        h2 { font-family: var(--font-display); font-size: 24px; font-weight: 400; line-height: 1.2; }
        h3 { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-2); }

        /* Cards */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
        .card-accent { background: var(--accent-dim); border-color: rgba(232, 148, 10, 0.18); }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 14px 24px; border-radius: 12px;
            font-family: var(--font-body); font-size: 15px; font-weight: 600;
            cursor: pointer; border: none; transition: all 0.15s;
        }
        .btn-primary { background: var(--accent); color: #121210; width: 100%; }
        .btn-primary:active { opacity: 0.82; transform: scale(0.98); }
        .btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); }
        .btn-ghost:active { opacity: 0.7; }
        .btn-sm { padding: 10px 16px; font-size: 13px; border-radius: 8px; }

        /* Scale buttons */
        .scale-buttons { display: flex; gap: 8px; margin-top: 16px; }
        .scale-btn {
            flex: 1; aspect-ratio: 1; border-radius: 12px;
            background: var(--surface-2); border: 2px solid transparent;
            color: var(--text-2); font-size: 19px; font-weight: 600;
            font-family: var(--font-display); cursor: pointer;
            transition: all 0.15s; display: flex; align-items: center; justify-content: center;
        }
        .scale-btn:active { transform: scale(0.9); }
        .scale-btn.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

        /* Option buttons */
        .option-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
        .option-btn {
            padding: 15px 18px; border-radius: 12px; background: var(--surface-2);
            border: 2px solid transparent; color: var(--text); font-family: var(--font-body);
            font-size: 15px; font-weight: 500; cursor: pointer; text-align: left;
            transition: all 0.15s; display: flex; align-items: center; gap: 14px;
        }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.selected { background: var(--accent-dim); border-color: var(--accent); }
        .opt-icon { font-size: 18px; width: 24px; text-align: center; color: var(--text-2); font-style: normal; font-family: monospace; font-weight: 400; }
        .opt-label { flex: 1; line-height: 1.1; }
        .opt-sub { font-size: 12px; color: var(--text-2); font-weight: 400; margin-top: 2px; }

        /* Text inputs */
        .text-input {
            width: 100%; background: var(--surface-2); border: 1.5px solid var(--border);
            border-radius: 12px; padding: 14px 16px; color: var(--text);
            font-family: var(--font-body); font-size: 16px; margin-top: 14px;
            resize: none; outline: none; transition: border-color 0.15s;
        }
        .text-input:focus { border-color: rgba(232, 148, 10, 0.5); }
        .text-input::placeholder { color: var(--text-3); }

        /* Check-in */
        .checkin-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--accent-dim); color: var(--accent);
            border-radius: 20px; padding: 5px 12px;
            font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
            margin-bottom: 14px;
        }

        .progress-bar { height: 2px; background: var(--surface-2); border-radius: 2px; margin-bottom: 32px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .step { display: none; }
        .step.active { display: block; animation: slideIn 0.28s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }

        .question-label { font-family: var(--font-display); font-size: 28px; font-weight: 300; line-height: 1.2; margin-bottom: 6px; }
        .question-sub { color: var(--text-2); font-size: 14px; line-height: 1.5; }

        .nav-row { display: flex; gap: 8px; margin-top: 14px; }
        .nav-row .btn { flex: 1; }

        /* Insights */
        .metric-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .metric-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: center; }
        .metric-value { font-family: var(--font-display); font-size: 38px; font-weight: 300; color: var(--accent); line-height: 1; margin-bottom: 6px; }
        .metric-label { font-size: 10px; color: var(--text-2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; line-height: 1.4; }

        .chart-wrap { position: relative; height: 160px; margin-top: 16px; }

        /* Log */
        .log-entry { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; }
        .log-entry-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .type-badge { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 10px; border-radius: 8px; }
        .type-badge.morning { background: rgba(232, 148, 10, 0.15); color: var(--accent); }
        .type-badge.afternoon { background: rgba(92, 170, 111, 0.15); color: var(--positive); }

        .me-row { display: flex; gap: 16px; margin-bottom: 8px; }
        .me-stat { display: flex; align-items: baseline; gap: 5px; font-size: 13px; color: var(--text-2); }
        .me-stat strong { font-family: var(--font-display); font-size: 22px; font-weight: 300; }

        /* Settings */
        .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .settings-row:last-child { border-bottom: none; }
        .settings-label { font-size: 15px; font-weight: 500; }
        .settings-sub { font-size: 12px; color: var(--text-2); margin-top: 2px; }

        /* Empty state */
        .empty-state { text-align: center; padding: 52px 20px; color: var(--text-2); }
        .empty-icon { font-size: 44px; margin-bottom: 16px; }
        .empty-state p { font-size: 14px; line-height: 1.7; }

        /* Toast */
        .toast {
            position: fixed; bottom: calc(var(--nav-height) + 16px);
            left: 50%; transform: translateX(-50%) translateY(16px);
            background: var(--surface-2); border: 1px solid rgba(240,220,160,0.15);
            border-radius: 12px; padding: 12px 20px;
            font-size: 14px; font-weight: 500;
            opacity: 0; transition: all 0.28s; z-index: 200;
            white-space: nowrap; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Done state */
        .done-card { text-align: center; padding: 28px 16px; }
        .done-icon { font-size: 52px; margin-bottom: 14px; display: block; }
        .done-title { font-family: var(--font-display); font-size: 26px; font-weight: 300; margin-bottom: 8px; }
        .done-sub { font-size: 14px; color: var(--text-2); line-height: 1.7; }

        /* Phase card */
        .phase-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; overflow: hidden; position: relative; }
        .phase-card::after { content: ''; position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; border-radius: 50%; background: var(--phase-glow, rgba(232,148,10,0.1)); }
        .phase-name { font-family: var(--font-display); font-size: 22px; font-weight: 400; margin-top: 8px; margin-bottom: 6px; }
        .phase-desc { font-size: 13px; color: var(--text-2); line-height: 1.6; }

        @keyframes pop { 0% { transform: scale(0.7); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        .pop { animation: pop 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: inline-block; }

        /* Delta badge */
        .delta { display: inline-flex; align-items: baseline; gap: 4px; }
        .delta .val { font-family: var(--font-display); font-size: 36px; font-weight: 300; }

        code { font-family: 'Courier New', monospace; font-size: 12px; background: var(--surface-2); padding: 2px 6px; border-radius: 4px; }

        ::-webkit-scrollbar { width: 0; }

        /* Section header */
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; margin-top: 20px; }
        .section-header:first-child { margin-top: 0; }

        /* FAB */
        .fab {
            position: fixed;
            right: 20px;
            bottom: calc(var(--nav-height) + env(safe-area-inset-bottom, 0px) + 16px);
            width: 52px; height: 52px;
            border-radius: 50%;
            background: var(--accent);
            border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(232,148,10,0.35);
            z-index: 90;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .fab:active { transform: scale(0.92); box-shadow: 0 2px 10px rgba(232,148,10,0.2); }
        .fab svg { width: 22px; height: 22px; stroke: #121210; }

        /* Quick log modal */
        .ql-modal {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(12,12,10,0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: flex-end;
        }
        .ql-inner {
            width: 100%; max-width: 480px; margin: 0 auto;
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            border-top: 1px solid rgba(240,220,160,0.1);
            max-height: 88vh;
            display: flex; flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom, 0px);
            animation: slideUp 0.28s cubic-bezier(0.4,0,0.2,1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .ql-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .ql-title { font-family: var(--font-display); font-size: 20px; font-weight: 400; }
        .ql-close {
            background: var(--surface-2); border: none; color: var(--text-2);
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
            font-size: 13px; display: flex; align-items: center; justify-content: center;
        }
        .ql-body {
            padding: 20px; overflow-y: auto; flex: 1;
            display: flex; flex-direction: column; gap: 14px;
        }

        /* Conversation bubbles */
        .bubble {
            max-width: 88%; padding: 12px 16px; border-radius: 18px;
            font-size: 15px; line-height: 1.5; animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .bubble-ai {
            background: var(--surface-2); color: var(--text);
            border-bottom-left-radius: 4px; align-self: flex-start;
        }
        .bubble-user {
            background: var(--accent-dim); color: var(--text);
            border: 1px solid rgba(232,148,10,0.18);
            border-bottom-right-radius: 4px; align-self: flex-end;
        }
        .bubble-action {
            background: rgba(92,170,111,0.1); color: var(--positive);
            border: 1px solid rgba(92,170,111,0.2);
            border-radius: 12px; align-self: stretch;
            font-size: 13px; font-weight: 500;
        }
        .bubble-thinking {
            background: var(--surface-2); align-self: flex-start;
            padding: 14px 18px; border-bottom-left-radius: 4px;
        }
        .dot-pulse { display: flex; gap: 5px; align-items: center; }
        .dot-pulse span {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--text-3); animation: dpulse 1.2s infinite;
        }
        .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
        .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dpulse { 0%,60%,100% { opacity: 0.3; transform: scale(0.8); } 30% { opacity: 1; transform: scale(1); } }

        /* Input area */
        .ql-input-row {
            display: flex; gap: 10px; align-items: flex-end;
            padding: 12px 20px 16px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .ql-textarea {
            flex: 1; background: var(--surface-2); border: 1.5px solid var(--border);
            border-radius: 16px; padding: 12px 14px; color: var(--text);
            font-family: var(--font-body); font-size: 15px;
            resize: none; outline: none; max-height: 120px;
            transition: border-color 0.15s; line-height: 1.4;
        }
        .ql-textarea:focus { border-color: rgba(232,148,10,0.4); }
        .ql-textarea::placeholder { color: var(--text-3); }
        .ql-send {
            width: 42px; height: 42px; border-radius: 50%;
            background: var(--accent); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: opacity 0.15s;
        }
        .ql-send:disabled { opacity: 0.35; cursor: default; }
        .ql-send svg { width: 18px; height: 18px; stroke: #121210; }
        .ql-attach-btn { background: none; border: none; color: var(--text-3); cursor: pointer; padding: 0 6px 0 0; flex-shrink: 0; display: flex; align-items: center; transition: color 0.15s; }
        .ql-attach-btn:active { color: var(--accent); }
        .ql-attach-btn svg { width: 18px; height: 18px; }
        .ql-attachment-chip { display: flex; align-items: center; gap: 8px; margin: 0 20px 6px; padding: 6px 12px; background: var(--accent-dim); border: 1px solid rgba(232,148,10,0.2); border-radius: 20px; font-size: 12px; color: var(--accent); flex-shrink: 0; }
        .ql-attachment-chip span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
        .ql-attachment-chip button { background: none; border: none; color: var(--accent); opacity: 0.6; cursor: pointer; font-size: 13px; padding: 0; flex-shrink: 0; line-height: 1; }

        /* Edit entry modal */
        .edit-field { margin-bottom: 18px; }
        .edit-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-2); margin-bottom: 4px; display: block; }
        .edit-scale-row { display: flex; gap: 6px; margin-top: 4px; }
        .edit-scale-btn { flex: 1; padding: 10px 0; border-radius: 10px; background: var(--surface-2); border: 2px solid transparent; color: var(--text-2); font-size: 16px; font-weight: 600; font-family: var(--font-display); cursor: pointer; transition: all 0.15s; text-align: center; }
        .edit-scale-btn.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
        .edit-select { width: 100%; background: var(--surface-2); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: var(--font-body); font-size: 15px; outline: none; -webkit-appearance: none; margin-top: 4px; }
        .edit-select:focus { border-color: rgba(232,148,10,0.4); }

        /* FAB action sheet */
        .fab-sheet {
            position: fixed; inset: 0; z-index: 190;
            display: flex; align-items: flex-end; justify-content: center;
        }
        .fab-sheet-backdrop {
            position: absolute; inset: 0; background: rgba(0,0,0,0.5);
        }
        .fab-sheet-inner {
            position: relative; z-index: 1;
            width: 100%; max-width: 480px;
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            border-top: 1px solid rgba(240,220,160,0.1);
            padding: 20px 20px calc(env(safe-area-inset-bottom, 0px) + 20px);
            animation: slideUp 0.22s cubic-bezier(0.4,0,0.2,1);
        }
        .fab-sheet-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 14px; text-align: center; }
        .fab-option {
            display: flex; align-items: center; gap: 16px;
            padding: 16px 18px; border-radius: 14px;
            background: var(--surface-2); border: 1px solid var(--border);
            margin-bottom: 10px; cursor: pointer;
            transition: background 0.15s;
        }
        .fab-option:active { background: var(--accent-dim); }
        .fab-option-icon { font-size: 22px; width: 32px; text-align: center; }
        .fab-option-label { font-size: 16px; font-weight: 600; color: var(--text); }
        .fab-option-sub { font-size: 13px; color: var(--text-2); margin-top: 2px; }

        /* Spot check-in scale */
        .spot-scale { display: flex; gap: 8px; margin-top: 8px; }
        .spot-scale-btn {
            flex: 1; padding: 12px 0; border-radius: 12px;
            background: var(--surface-2); border: 2px solid transparent;
            color: var(--text-2); font-size: 18px; font-weight: 600;
            font-family: var(--font-display); cursor: pointer;
            transition: all 0.15s; text-align: center;
        }
        .spot-scale-btn:active { transform: scale(0.9); }
        .spot-scale-btn.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
        .spot-label { font-family: var(--font-display); font-size: 26px; font-weight: 300; line-height: 1.2; margin-bottom: 4px; margin-top: 18px; }
        .spot-sub { color: var(--text-2); font-size: 13px; margin-bottom: 2px; }

        /* Health history */
        .hh-section { margin-bottom: 16px; }
        .hh-section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-2); margin-bottom: 8px; }
        .hh-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 13px; margin: 3px 4px 3px 0; color: var(--text); }
        .hh-tag.flagged { background: rgba(204,85,85,0.1); border-color: rgba(204,85,85,0.3); color: var(--negative); }
        .hh-tag.borderline { background: rgba(232,148,10,0.1); border-color: rgba(232,148,10,0.3); color: var(--accent); }
        .hh-tag.normal { background: rgba(92,170,111,0.08); border-color: rgba(92,170,111,0.2); color: var(--positive); }
        .hh-tag .hh-del { background: none; border: none; color: inherit; opacity: 0.5; cursor: pointer; font-size: 12px; padding: 0 0 0 4px; line-height: 1; }
        .hh-tag .hh-del:hover { opacity: 1; }
        .upload-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 11px 18px; border-radius: 10px;
            background: var(--surface-2); border: 1.5px dashed rgba(240,220,160,0.2);
            color: var(--text-2); font-family: var(--font-body); font-size: 14px;
            font-weight: 500; cursor: pointer; transition: all 0.15s;
        }
        .upload-btn:active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
        .review-panel { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-top: 14px; }
        .review-panel h3 { margin-bottom: 12px; }
        .result-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .result-row:last-child { border-bottom: none; }

// Cycle phase lookup
function getCyclePhase(day) {
    if (!day || day < 1) return null;
    if (day <= 5)  return { name: 'Menstrual',   color: '#cc6666', glow: 'rgba(204,102,102,0.12)',   desc: 'Rest if you can. Energy is lower and that\'s completely normal.' };
    if (day <= 13) return { name: 'Follicular',  color: '#5caa6f', glow: 'rgba(92,170,111,0.12)',    desc: 'Energy rising. Good phase for new ideas and tackling hard things.' };
    if (day <= 16) return { name: 'Ovulatory',   color: '#e8940a', glow: 'rgba(232,148,10,0.14)',    desc: 'Peak energy and confidence window. Make the most of it.' };
    if (day <= 35) return { name: 'Luteal',      color: '#9b7cdb', glow: 'rgba(155,124,219,0.12)',   desc: 'Energy dropping toward period. PMDD risk window — be extra gentle with yourself.' };
    return null;
}

// ============================================================
// SUPABASE
// ============================================================
function initSupabase() {
    const url = localStorage.getItem('sb_url');
    const key = localStorage.getItem('sb_key');
    if (url && key) {
        try { sbClient = supabase.createClient(url, key); return true; }
        catch(e) { return false; }
    }
    return false;
}

async function saveEntry(data) {
    const withDate = { ...data, entry_date: todayStr() };
    if (sbClient) {
        try {
            const { data: row, error } = await sbClient.from('daily_checkins').insert([withDate]).select().single();
            if (!error && row) return { data: row };
            if (error) {
                console.error('Supabase insert error:', error.message);
                showToast('Supabase error — saved locally instead');
            }
        } catch (err) {
            console.error('Supabase exception:', err);
            showToast('Could not reach database — saved locally');
        }
    }
    // Fallback: local storage
    const local = JSON.parse(localStorage.getItem('local_entries') || '[]');
    const row = { ...withDate, id: `local_${Date.now()}`, created_at: new Date().toISOString() };
    local.unshift(row);
    localStorage.setItem('local_entries', JSON.stringify(local));
    return { data: row };
}

async function loadEntries() {
    if (sbClient) {
        try {
            const { data, error } = await sbClient
                .from('daily_checkins').select('*')
                .order('created_at', { ascending: false }).limit(120);
            if (!error && data) { entries = data; return; }
            if (error) {
                console.error('Supabase load error:', error.message);
                showToast('Could not load from Supabase — showing local data');
            }
        } catch (err) {
            console.error('Supabase load exception:', err);
        }
    }
    entries = JSON.parse(localStorage.getItem('local_entries') || '[]');
}

// ============================================================
// HELPERS
// ============================================================
function todayStr() {
    // Use local date (not UTC) — critical for UTC+10 (QLD) users
    const d = new Date();
    return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
}

function formatDate(ds) {
    return new Date(ds + 'T12:00:00').toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
}

function getHour() { return new Date().getHours(); }
function getCheckInType() { return getHour() < 13 ? 'morning' : 'afternoon'; }

function getTodayEntries() {
    const today = todayStr();
    todayEntries.morning = entries.find(e => e.entry_date === today && e.type === 'morning') || null;
    todayEntries.afternoon = entries.find(e => e.entry_date === today && e.type === 'afternoon') || null;
}

function calcAvg(arr, field) {
    const vals = arr.map(e => e[field]).filter(v => v != null && !isNaN(v));
    if (!vals.length) return null;
    return (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1);
}

function getRecentEntries(days) {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
    return entries.filter(e => {
        const ds = e.entry_date || e.created_at?.split('T')[0];
        if (!ds) return false;
        // Parse at noon local to avoid UTC midnight being interpreted as previous day
        return new Date(ds + 'T12:00:00') >= cutoff;
    });
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
// NAVIGATION
// ============================================================
function navigate(view) {
    const viewEl = document.getElementById(`view-${view}`);
    const navEl = document.querySelector(`[data-view="${view}"]`);
    if (!viewEl || !navEl) { console.warn('navigate: unknown view', view); return; }
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    viewEl.classList.add('active');
    navEl.classList.add('active');
    currentView = view;
    if (view === 'checkin') renderCheckIn();
    if (view === 'insights') renderInsights();
    if (view === 'log') renderLog();
    if (view === 'settings') renderSettings();
}

// ============================================================
// GARMIN SNAPSHOT BUILDER (avoids nested template literals)
// ============================================================
function buildGarminSnap(m) {
    if (!m) return '';
    if (m.sleep_score == null && m.body_battery == null && m.steps_yesterday == null && !m.weight) return '';

    let metrics = '';
    if (m.sleep_score != null) metrics += '<div class="metric-card" style="flex:1;min-width:70px;"><div class="metric-value" style="font-size:28px;color:#9b7cdb;">' + m.sleep_score + '</div><div class="metric-label">Sleep</div></div>';
    if (m.body_battery != null) metrics += '<div class="metric-card" style="flex:1;min-width:70px;"><div class="metric-value" style="font-size:28px;">' + m.body_battery + '</div><div class="metric-label">Battery</div></div>';
    if (m.steps_yesterday != null) metrics += '<div class="metric-card" style="flex:1;min-width:70px;"><div class="metric-value" style="font-size:22px;color:var(--text-2);">' + Number(m.steps_yesterday).toLocaleString() + '</div><div class="metric-label">Steps</div></div>';
    if (m.weight) metrics += '<div class="metric-card" style="flex:1;min-width:70px;"><div class="metric-value" style="font-size:28px;color:var(--positive);">' + m.weight + '</div><div class="metric-label">kg</div></div>';

    let hrv = '';
    if (m.hrv_status || m.recovery_advisory) {
        hrv = '<div style="margin-top:10px;font-size:13px;color:var(--text-2);">';
        if (m.hrv_status) hrv += 'HRV: <strong style="color:var(--text);">' + esc(m.hrv_status) + '</strong>';
        if (m.hrv_status && m.recovery_advisory) hrv += ' &nbsp;·&nbsp; ';
        if (m.recovery_advisory) hrv += 'Advisory: <strong style="color:var(--text);">' + esc(m.recovery_advisory) + '</strong>';
        hrv += '</div>';
    }

    return '<div class="card" style="margin-bottom:12px;"><h3 style="margin-bottom:12px;">Today&#39;s stats</h3><div style="display:flex;gap:12px;flex-wrap:wrap;">' + metrics + '</div>' + hrv + '</div>';
}

// ============================================================
// CHECK-IN VIEW
// ============================================================
function renderCheckIn() {
    const el = document.getElementById('view-checkin');
    getTodayEntries();
    checkInType = getCheckInType();

    const hour = getHour();
    const greeting = hour < 12 ? 'Good morning.' : hour < 17 ? 'Good afternoon.' : 'Good evening.';
    const dayStr = new Date().toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });
    const alreadyDone = checkInType === 'morning' ? todayEntries.morning : todayEntries.afternoon;

    if (alreadyDone) {
        const bothDone = todayEntries.morning && todayEntries.afternoon;
        const m = todayEntries.morning;
        const todayStr_ = todayStr();
        const todayQLs = entries.filter(e => (e.entry_date || e.created_at?.split('T')[0]) === todayStr_ && e.type === 'quicklog');
        const todaySpots = entries.filter(e => (e.entry_date || e.created_at?.split('T')[0]) === todayStr_ && e.type === 'spot');

        const garminSnap = buildGarminSnap(m);
        const moodRow = m ? '<div style="display:flex;gap:16px;"><div style="font-size:12px;color:var(--text-2);">Mood <strong style="color:var(--accent);font-size:16px;">' + (m.mood||'–') + '</strong></div><div style="font-size:12px;color:var(--text-2);">Energy <strong style="color:var(--positive);font-size:16px;">' + (m.energy||'–') + '</strong></div></div>' : '';
        const statusMsg = bothDone ? 'Both check-ins logged' : checkInType === 'morning' ? 'Morning logged — back at 4pm' : 'All done for today';
        const nextType = checkInType === 'morning' ? 'afternoon' : 'morning';
        const nextBtn = !bothDone ? '<button class="btn btn-ghost btn-sm" onclick="forceCheckIn(\'' + nextType + '\')">Log ' + nextType + ' \u2192</button>' : '';
        const qlCount = todayQLs.length + todaySpots.length;
        const qlSection = qlCount
            ? (todaySpots.length ? '<div class="section-header"><h3>Spot check-ins today (' + todaySpots.length + ')</h3></div>' + todaySpots.map(buildLogEntry).join('') : '')
              + (todayQLs.length ? '<div class="section-header"><h3>Quick logs today (' + todayQLs.length + ')</h3></div>' + todayQLs.map(buildLogEntry).join('') : '')
            : '';

        el.innerHTML =
            '<div style="margin-bottom:20px;">' +
                '<div class="checkin-badge">✓ ' + checkInType.toUpperCase() + ' DONE</div>' +
                '<h1>' + greeting + '</h1>' +
                '<p style="color:var(--text-2);font-size:14px;margin-top:5px;">' + dayStr + '</p>' +
            '</div>' +
            garminSnap +
            '<div class="card card-accent" style="margin-bottom:12px;">' +
                '<div style="display:flex;justify-content:space-between;align-items:center;">' +
                    '<div><div style="font-size:13px;color:var(--text-2);margin-bottom:6px;">' + statusMsg + '</div>' + moodRow + '</div>' +
                    '<span style="font-size:32px;">' + (bothDone ? '🌟' : '🌿') + '</span>' +
                '</div>' +
            '</div>' +
            qlSection +
            '<div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;">' +
                '<button class="btn btn-ghost btn-sm" onclick="navigate(\'insights\')">Patterns →</button>' +
                '<button class="btn btn-ghost btn-sm" onclick="navigate(\'log\')">Full log →</button>' +
                nextBtn +
            '</div>' +
            (sbClient ? '<div style="margin-top:8px;"><button id="sync-btn" onclick="syncNow(this)" style="background:none;border:none;color:var(--text-3);font-size:12px;cursor:pointer;padding:4px 0;">\u21bb Sync from Supabase</button></div>' : '');
        return;
    }

    // Start fresh check-in
    checkInStep = 0;
    checkInData = {};
    const steps = checkInType === 'morning' ? morningSteps : afternoonSteps;

    el.innerHTML = `
        <div style="margin-bottom: 24px;">
            <div class="checkin-badge">${checkInType === 'morning' ? '☀' : '🌤'} ${checkInType.toUpperCase()} CHECK-IN</div>
            <h1>${greeting}</h1>
            <p style="color:var(--text-2);font-size:14px;margin-top:5px;">${dayStr}</p>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="pfill" style="width:${100/steps.length}%"></div></div>
        <div id="steps">${steps.map((s, i) => buildStep(s, i, steps.length)).join('')}</div>
    `;
    showStep(0);
}

function buildStep(step, index, total) {
    const isLast = index === total - 1;
    let inputHtml = '';

    if (step.type === 'scale') {
        const nextAction = isLast ? 'submitCheckIn()' : 'nextStep()';
        const noteField = step.noteId ? `
            <div id="scale-note-${index}" style="display:none; margin-top:14px;">
                <input type="text" class="text-input" style="margin-top:0;"
                    placeholder="${step.notePlaceholder || 'Add context... (optional)'}"
                    oninput="checkInData['${step.noteId}']=this.value.trim()||null">
            </div>` : '';
        inputHtml = `
            <div class="scale-buttons">
                ${[1,2,3,4,5].map(n => `<button class="scale-btn" onclick="selectScale('${step.id}',${n},this,${index},${isLast})">${n}</button>`).join('')}
            </div>
            ${noteField}
            <div class="nav-row" id="nbtn-${index}" style="display:none;">
                <button class="btn btn-primary" onclick="${nextAction}">${isLast ? 'Submit check-in' : 'Continue'}</button>
            </div>
        `;
    } else if (step.type === 'options') {
        inputHtml = `
            <div class="option-buttons">
                ${step.options.map(o => `
                    <button class="option-btn" onclick="selectOption('${step.id}','${o.value}',this,${index},${isLast})">
                        <span class="opt-icon">${o.icon}</span>
                        <span class="opt-label">${o.label}<div class="opt-sub">${o.sub}</div></span>
                    </button>
                `).join('')}
            </div>
            ${step.skippable ? `
            <div class="nav-row" style="margin-top:10px;">
                <button class="btn btn-ghost" onclick="${isLast ? 'submitCheckIn()' : 'skipAndNext()'}">Skip</button>
            </div>` : ''}
            <div class="nav-row" id="nbtn-${index}" style="display:none;">
                <button class="btn btn-primary" onclick="${isLast ? 'submitCheckIn()' : 'nextStep()'}">Continue</button>
            </div>
        `;
    } else if (step.type === 'number') {
        inputHtml = `
            <input type="number" class="text-input" id="inp-${step.id}"
                   min="${step.min ?? ''}" max="${step.max ?? ''}"
                   placeholder="${step.placeholder}" inputmode="decimal"
                   oninput="checkInData['${step.id}']=this.value.trim()!==''?parseFloat(this.value):null">
            <div class="nav-row">
                <button class="btn btn-primary" onclick="${isLast ? 'submitCheckIn()' : 'nextStep()'}">
                    ${isLast ? 'Submit' : 'Continue'}
                </button>
                ${step.skippable ? `<button class="btn btn-ghost" onclick="${isLast ? 'submitCheckIn()' : 'skipAndNext()'}">Skip</button>` : ''}
            </div>
        `;
    } else if (step.type === 'text') {
        inputHtml = `
            <input type="text" class="text-input" id="inp-${step.id}"
                   placeholder="${step.placeholder || ''}"
                   oninput="checkInData['${step.id}']=this.value.trim()||null">
            <div class="nav-row">
                <button class="btn btn-primary" onclick="${isLast ? 'submitCheckIn()' : 'nextStep()'}">
                    ${isLast ? 'Submit' : 'Continue'}
                </button>
                ${step.skippable ? `<button class="btn btn-ghost" onclick="${isLast ? 'submitCheckIn()' : 'skipAndNext()'}">Skip</button>` : ''}
            </div>
        `;
    } else if (step.type === 'textarea') {
        inputHtml = `
            <textarea class="text-input" id="inp-${step.id}" rows="3"
                      placeholder="${step.placeholder || ''}"
                      oninput="checkInData['${step.id}']=this.value.trim()||null"></textarea>
            <div class="nav-row">
                <button class="btn btn-primary" onclick="submitCheckIn()">Submit check-in</button>
                ${step.skippable ? `<button class="btn btn-ghost" onclick="submitCheckIn()">Skip &amp; submit</button>` : ''}
            </div>
        `;
    }

    return `<div class="step" id="step-${index}"><p class="question-label">${step.question}</p>${step.sub ? `<p class="question-sub">${step.sub}</p>` : ''}${inputHtml}</div>`;
}

function showStep(i) {
    const steps = checkInType === 'morning' ? morningSteps : afternoonSteps;
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    const el = document.getElementById(`step-${i}`);
    if (el) {
        el.classList.add('active');
        const inp = el.querySelector('input, textarea');
        if (inp) setTimeout(() => inp.focus(), 150);
    }
    const fill = document.getElementById('pfill');
    if (fill) fill.style.width = `${((i + 1) / steps.length) * 100}%`;
}

function selectScale(field, val, btn, stepIdx, isLast) {
    checkInData[field] = val;
    btn.closest('.scale-buttons').querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    // Show note field if present
    const noteEl = document.getElementById(`scale-note-${stepIdx}`);
    if (noteEl) {
        noteEl.style.display = 'block';
        const inp = noteEl.querySelector('input');
        if (inp) setTimeout(() => inp.focus(), 120);
    }
    const nb = document.getElementById(`nbtn-${stepIdx}`);
    if (nb) nb.style.display = 'flex';
}

function selectOption(field, val, btn, stepIdx, isLast) {
    checkInData[field] = val;
    btn.closest('.option-buttons').querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    setTimeout(() => {
        if (!isLast) nextStep();
        else {
            const nb = document.getElementById(`nbtn-${stepIdx}`);
            if (nb) nb.style.display = 'flex';
        }
    }, 320);
}

function nextStep() {
    const steps = checkInType === 'morning' ? morningSteps : afternoonSteps;
    if (checkInStep < steps.length - 1) { checkInStep++; showStep(checkInStep); }
}

function skipAndNext() {
    const steps = checkInType === 'morning' ? morningSteps : afternoonSteps;
    checkInData[steps[checkInStep].id] = null;
    nextStep();
}

function forceCheckIn(type) {
    checkInType = type;
    checkInStep = 0;
    checkInData = {};
    const el = document.getElementById('view-checkin');
    const steps = type === 'morning' ? morningSteps : afternoonSteps;
    const hour = getHour();
    const greeting = hour < 12 ? 'Good morning.' : hour < 17 ? 'Good afternoon.' : 'Good evening.';
    const dayStr = new Date().toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });
    el.innerHTML = `
        <div style="margin-bottom: 24px;">
            <div class="checkin-badge">${type === 'morning' ? '☀' : '🌤'} ${type.toUpperCase()} CHECK-IN</div>
            <h1>${greeting}</h1>
            <p style="color:var(--text-2);font-size:14px;margin-top:5px;">${dayStr}</p>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="pfill" style="width:${100/steps.length}%"></div></div>
        <div id="steps">${steps.map((s, i) => buildStep(s, i, steps.length)).join('')}</div>
    `;
    showStep(0);
}

let submitInProgress = false;
async function submitCheckIn() {
    if (submitInProgress) return;
    if (!checkInData.mood || !checkInData.energy) {
        showToast('Mood and energy are required'); return;
    }
    submitInProgress = true;
    try {
        const { data } = await saveEntry({ type: checkInType, ...checkInData });
        if (data) entries.unshift(data);
        renderComplete(checkInData);
        showToast(sbClient ? 'Saved ✓' : 'Saved locally ✓');
    } catch(e) {
        showToast('Saved locally (connect Supabase in Setup to sync)');
        renderComplete(checkInData);
    } finally {
        submitInProgress = false;
    }
}

// ============================================================
// POST-CHECK-IN OBSERVATION
// ============================================================
async function getCheckInObservation(d) {
    const el = document.getElementById('checkin-obs');
    if (!el) return;

    // Only bother if we have some history to compare against
    const recent = getRecentEntries(14);
    if (recent.length < 3) return;

    el.innerHTML = '<div style="margin-top:4px;padding:12px 14px;background:var(--surface-2);border-radius:12px;border:1px solid var(--border);font-size:13px;color:var(--text-3);">Reading your patterns...</div>';

    const recentSummary = recent.slice(0, 14).map(e => {
        const parts = [`[${e.entry_date} ${e.type}]`];
        if (e.mood) parts.push(`mood:${e.mood}`);
        if (e.energy) parts.push(`energy:${e.energy}`);
        if (e.sleep_score != null) parts.push(`sleep:${e.sleep_score}`);
        if (e.body_battery != null) parts.push(`battery:${e.body_battery}`);
        if (e.hrv_status) parts.push(`hrv:${e.hrv_status}`);
        if (e.movement) parts.push(`movement:${e.movement}`);
        if (e.work_status) parts.push(`work:${e.work_status}`);
        if (e.cycle_day) parts.push(`cycle_day:${e.cycle_day}`);
        if (e.weight) parts.push(`weight:${e.weight}kg`);
        return parts.join(' ');
    }).join('\n');

    const todayEntry = Object.entries(d).filter(([k,v]) => v != null).map(([k,v]) => `${k}: ${v}`).join(', ');
    const healthCtx = getHealthHistoryContext();
    const profileCtx = getProfileContext();

    const systemPrompt = `You are a behaviour coach. Nik just logged a check-in. Give ONE short observation — 1-2 sentences max — about what today's numbers mean in the context of her recent data. Be specific and factual. Reference actual numbers or patterns. No advice. No fluff. No "great job." If there's nothing genuinely interesting to say, return exactly the string "nothing".${healthCtx}${profileCtx}`;

    try {
        const res = await fetch('/.netlify/functions/claude', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                system: systemPrompt,
                messages: [{ role: 'user', content: `Today's check-in: ${todayEntry}

Recent history:
${recentSummary}` }],
                max_tokens: 120
            })
        });
        if (!res.ok) { el.innerHTML = ''; return; }
        const data = await res.json();
        const text = (data.content?.[0]?.text || '').trim();
        if (!text || text.toLowerCase() === 'nothing') { el.innerHTML = ''; return; }

        const safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        el.innerHTML = `<div style="margin-top:4px;padding:12px 14px;background:var(--surface-2);border-radius:12px;border:1px solid var(--border);font-size:13px;color:var(--text-2);line-height:1.6;font-style:italic;">${safe}</div>`;
    } catch(e) {
        el.innerHTML = '';
    }
}

            <button class="btn btn-primary" onclick="runFullAnalysis()" style="width:auto;padding:12px 20px;background:rgba(155,124,219,0.9);color:#fff;" id="full-analysis-btn">Run full analysis</button>
            <div id="full-analysis-result"></div>
        </div>

        ${phase ? `
        <div class="phase-card" style="--phase-glow:${phase.glow}; margin-bottom:16px;">
            <h3>Current phase</h3>
            <div class="phase-name" style="color:${phase.color};">${phase.name}</div>
            <div class="phase-desc">${phase.desc}</div>
        </div>` : ''}

        <div class="metric-row">
            <div class="metric-card">
                <div class="metric-value">${avgMood || '–'}</div>
                <div class="metric-label">Avg Mood<br>14 days</div>
            </div>
            <div class="metric-card">
                <div class="metric-value">${avgEnergy || '–'}</div>
                <div class="metric-label">Avg Energy<br>14 days</div>
            </div>
            <div class="metric-card">
                <div class="metric-value">${moveRate}%</div>
                <div class="metric-label">Days with<br>Movement</div>
            </div>

            <h3>Mood &amp; energy — last 14 days</h3>

            <h3>Weight — last 30 days</h3>
            <div class="chart-wrap"><canvas id="weight-chart"></canvas></div>
        </div>` : ''; })()}

        ${workRate !== null ? `

            <div style="display:flex;align-items:baseline;gap:8px;margin-top:12px;">
                <span style="font-family:var(--font-display);font-size:42px;font-weight:300;color:var(--accent);">${workRate}%</span>

        ${moodMove && moodNoMove && withMove.length >= 3 && noMove.length >= 3 ? `
        <div class="card">
            <h3>Movement &amp; mood</h3>
            <div style="display:flex;gap:20px;margin-top:12px;align-items:center;">
                <div>
                    <div style="font-size:10px;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">With movement</div>
                    <div style="font-family:var(--font-display);font-size:32px;font-weight:300;color:var(--positive);">${moodMove}</div>

                <div>
                    <div style="font-size:10px;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Without</div>
                    <div style="font-family:var(--font-display);font-size:32px;font-weight:300;color:var(--text-2);">${moodNoMove}</div>
                </div>
            </div>
            <p style="font-size:13px;color:var(--text-2);margin-top:10px;line-height:1.5;">
                ${parseFloat(moodMove) > parseFloat(moodNoMove)
                    ? `Mood averages ${(parseFloat(moodMove)-parseFloat(moodNoMove)).toFixed(1)} points higher on days you move. That\'s your data, not a lecture.`
                    : 'No clear movement-mood link yet in your data. Keep logging — more entries will tell.'}
            </p>
        </div>` : ''}

        ${delta !== null ? `
        <div class="card">
            <h3>Day trajectory</h3>
            <div style="margin-top:12px;">
                <div class="delta">
                    <span class="val" style="color:${parseFloat(delta)>=0?'var(--positive)':'var(--negative)'};">${parseFloat(delta)>=0?'+':''}${delta}</span>
                    <span style="font-size:13px;color:var(--text-2);">avg mood shift, morning → afternoon</span>
                </div>
            </div>
            <p style="font-size:13px;color:var(--text-2);margin-top:10px;line-height:1.5;">
                ${parseFloat(delta)>=0 ? 'Your days tend to trend upward as they go. That\'s worth knowing.' : 'Your days tend to dip by afternoon. Good to be aware of — what\'s driving that?'}
            </p>
        </div>` : ''}
    `;

    renderTrendChart();
    renderWeightChart();
    renderSynthesisHistory();
    restoreLastPatternRead();
}

function renderTrendChart() {
    const canvas = document.getElementById('trend-chart');
    if (!canvas) return;
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

    const last14 = getRecentEntries(14);
    if (!last14.length) return;

    const byDate = {};
    last14.forEach(e => {
        const d = e.entry_date || e.created_at?.split('T')[0];
        if (!d) return; // skip entries with no date
        if (!byDate[d]) byDate[d] = { moods: [], energies: [] };
        if (e.mood) byDate[d].moods.push(e.mood);
        if (e.energy) byDate[d].energies.push(e.energy);
    });

    const dates = Object.keys(byDate).sort();
    const labels = dates.map(d => new Date(d + 'T12:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }));
    const moods = dates.map(d => { const m = byDate[d].moods; return m.length ? +(m.reduce((a,b)=>a+b,0)/m.length).toFixed(1) : null; });
    const energies = dates.map(d => { const e = byDate[d].energies; return e.length ? +(e.reduce((a,b)=>a+b,0)/e.length).toFixed(1) : null; });

    chartInstance = new Chart(canvas, {
        type: 'line',
        data: {
            labels,
            datasets: [
                { label: 'Mood', data: moods, borderColor: '#e8940a', backgroundColor: 'rgba(232,148,10,0.08)', borderWidth: 2, pointRadius: 3.5, pointBackgroundColor: '#e8940a', tension: 0.4, fill: true, spanGaps: true },
                { label: 'Energy', data: energies, borderColor: '#5caa6f', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 3.5, pointBackgroundColor: '#5caa6f', tension: 0.4, fill: false, spanGaps: true }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: '#9a9480', font: { size: 11, family: 'Plus Jakarta Sans' }, boxWidth: 10, padding: 14 } },
                tooltip: { backgroundColor: '#242418', borderColor: 'rgba(240,220,160,0.12)', borderWidth: 1, titleColor: '#f0e8d0', bodyColor: '#9a9480', padding: 10 }
            },
            scales: {
                x: { ticks: { color: '#4a4840', font: { size: 10 }, maxTicksLimit: 7 }, grid: { color: 'rgba(240,220,160,0.03)' } },
                y: { min: 0, max: 5.5, ticks: { color: '#4a4840', font: { size: 10 }, stepSize: 1, callback: v => v <= 5 ? v : '' }, grid: { color: 'rgba(240,220,160,0.03)' } }
            }
        }
    });
}

function renderWeightChart() {
    const canvas = document.getElementById('weight-chart');
    if (!canvas) return;
    if (weightChartInstance) { weightChartInstance.destroy(); weightChartInstance = null; }

    const last30 = getRecentEntries(30).filter(e => e.weight);
    if (last30.length < 3) return;

    // Average weight per day (in case of multiple entries)
    const byDate = {};
    last30.forEach(e => {
        const d = e.entry_date || e.created_at?.split('T')[0];
        if (!d || !e.weight) return;
        if (!byDate[d]) byDate[d] = [];
        byDate[d].push(parseFloat(e.weight));
    });

    const dates = Object.keys(byDate).sort();
    const labels = dates.map(d => new Date(d + 'T12:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short' }));
    const weights = dates.map(d => {
        const vals = byDate[d];
        return +(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
    });

    // Y-axis: tight range around data
    const min = Math.floor(Math.min(...weights) - 1);
    const max = Math.ceil(Math.max(...weights) + 1);

    weightChartInstance = new Chart(canvas, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                label: 'Weight (kg)',
                data: weights,
                borderColor: '#9b7cdb',
                backgroundColor: 'rgba(155,124,219,0.07)',
                borderWidth: 2,
                pointRadius: 3.5,
                pointBackgroundColor: '#9b7cdb',
                tension: 0.4,
                fill: true,
                spanGaps: true
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: '#9a9480', font: { size: 11, family: 'Plus Jakarta Sans' }, boxWidth: 10 } },
                tooltip: { backgroundColor: '#242418', borderColor: 'rgba(240,220,160,0.12)', borderWidth: 1, titleColor: '#f0e8d0', bodyColor: '#9a9480', padding: 10 }
            },
            scales: {
                x: { ticks: { color: '#4a4840', font: { size: 10 }, maxTicksLimit: 7 }, grid: { color: 'rgba(240,220,160,0.03)' } },
                y: { min, max, ticks: { color: '#4a4840', font: { size: 10 }, callback: v => v + 'kg' }, grid: { color: 'rgba(240,220,160,0.03)' } }
            }
        }
    });
}

function renderLog() {
    const el = document.getElementById('view-log');
    if (!entries.length) {
        el.innerHTML = `<h2 style="margin-bottom:20px;">Your log</h2><div class="empty-state"><div class="empty-icon">📋</div><p>Nothing logged yet. Your check-ins will show up here.</p></div>`;
        return;
    }

    const byDate = {};
    entries.forEach(e => {
        const d = e.entry_date || e.created_at?.split('T')[0];
        if (!d) return; // skip entries with no recoverable date
        if (!byDate[d]) byDate[d] = [];
        byDate[d].push(e);
    });

    const sorted = Object.keys(byDate).sort().reverse();
    el.innerHTML = `
        <h2 style="margin-bottom:20px;">Your log</h2>
        ${sorted.map(d => `
            <div class="section-header"><h3>${formatDate(d)}</h3></div>
            ${byDate[d].sort((a,b)=>{
                const order = {morning:0,afternoon:1,spot:2,quicklog:3};
                return (order[a.type]??3)-(order[b.type]??3);
            }).map(buildLogEntry).join('')}
        `).join('')}
    `;
}

function buildLogEntry(e) {
    // Quick log entries
    const entryId = e.id || '';
    if (e.type === 'quicklog') {
        const lines = (e.note||'').split('\n');
        const bubbles = lines.map(l => {
            if (!l.trim()) return '';
            const isNik = l.startsWith('Nik:');
            const isCoach = l.startsWith('Coach:');
            const rawText = l.replace(/^(Nik:|Coach:)\s*/, '');
            if (!rawText) return '';
            const safe = esc(rawText);
            if (isNik) return `<div style="font-size:13px;color:var(--text-2);margin-bottom:4px;padding-left:8px;border-left:2px solid rgba(232,148,10,0.3);">${safe}</div>`;
            if (isCoach) return `<div style="font-size:13px;color:var(--text);margin-bottom:4px;font-weight:500;">${safe}</div>`;
            return `<div style="font-size:13px;color:var(--text-2);margin-bottom:4px;">${safe}</div>`;
        }).join('');
        return `
            <div class="log-entry">
                <div class="log-entry-header">
                    <span class="type-badge" style="background:rgba(155,124,219,0.15);color:#9b7cdb;">⚡ Quick log</span>
                    <button onclick="deleteEntry('${entryId}')" style="background:none;border:none;color:var(--text-3);font-size:16px;cursor:pointer;padding:4px 6px;border-radius:6px;" title="Delete">✕</button>
                </div>
                ${bubbles}
            </div>`;
    }
    // Spot check-in entries
    if (e.type === 'spot') {
        return `
            <div class="log-entry">
                <div class="log-entry-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span class="type-badge" style="background:rgba(92,170,111,0.12);color:var(--positive);">📊 Spot</span>
                        ${e.created_at ? `<span style="font-size:11px;color:var(--text-3);">${new Date(e.created_at).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',hour12:true})}</span>` : ''}
                    </div>
                    <div style="display:flex;align-items:center;gap:10px;">
                        <button onclick="editEntry('${entryId}')" style="background:none;border:none;color:var(--text-2);font-size:15px;cursor:pointer;padding:4px 6px;border-radius:6px;" title="Edit">✎</button>
                        <button onclick="deleteEntry('${entryId}')" style="background:none;border:none;color:var(--text-3);font-size:16px;cursor:pointer;padding:4px 6px;border-radius:6px;" title="Delete">✕</button>
                    </div>
                </div>
                <div class="me-row">
                    <div class="me-stat"><span>Mood</span><strong style="color:var(--accent);">${e.mood}</strong></div>
                    <div class="me-stat"><span>Energy</span><strong style="color:var(--positive);">${e.energy}</strong></div>
                </div>
                ${e.mood_note ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:3px;font-style:italic;">"${esc(e.mood_note)}"</div>` : ''}
                ${e.energy_note ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:3px;font-style:italic;">"${esc(e.energy_note)}"</div>` : ''}
                ${e.note ? `<div style="font-size:13px;color:var(--text);margin-top:6px;line-height:1.5;">${esc(e.note)}</div>` : ''}
            </div>`;
    }
    const bLabels = { checked_in: 'Checked in', drifted: 'Drifted', autopilot: 'Autopilot' };
    const mLabels = { yes: '↑ Movement', a_bit: '→ A bit', no: '— No movement' };
    const wLabels = { done: '✓ Done', in_progress: '~ In progress', didnt_happen: '— Didn\'t happen' };
    const fLabels = { on_target: '→ On target', scattered: '~ Scattered', hyperfocused: '⬤ Hyperfocused', checked_out: '— Checked out' };
    return `
        <div class="log-entry">
            <div class="log-entry-header">
                <span class="type-badge ${e.type}">${e.type === 'morning' ? '☀ Morning' : '🌤 Afternoon'}</span>
                <div style="display:flex;align-items:center;gap:10px;">
                    ${e.cycle_day ? `<span style="font-size:12px;color:var(--text-2);">Day ${e.cycle_day}</span>` : ''}
                    <button onclick="editEntry('${entryId}')" style="background:none;border:none;color:var(--text-2);font-size:15px;cursor:pointer;padding:4px 6px;border-radius:6px;" title="Edit">✎</button>
                    <button onclick="deleteEntry('${entryId}')" style="background:none;border:none;color:var(--text-3);font-size:16px;cursor:pointer;padding:4px 6px;border-radius:6px;" title="Delete">✕</button>
                </div>
            </div>
            ${(e.sleep_score || e.body_battery || e.hrv_status || e.steps_yesterday || e.weight) ? `
            <div class="me-row" style="margin-bottom:8px;flex-wrap:wrap;gap:12px;">
                ${e.sleep_score ? `<div class="me-stat"><span>Sleep</span><strong style="color:#9b7cdb;">${e.sleep_score}</strong></div>` : ''}
                ${e.body_battery ? `<div class="me-stat"><span>Battery</span><strong style="color:#e8940a;">${e.body_battery}</strong></div>` : ''}
                ${e.steps_yesterday ? `<div class="me-stat"><span>Steps</span><strong style="color:var(--text-2);">${Number(e.steps_yesterday).toLocaleString()}</strong></div>` : ''}
                ${e.weight ? `<div class="me-stat"><span>Weight</span><strong style="color:var(--positive);">${e.weight}kg</strong></div>` : ''}
                ${e.hrv_status ? `<div class="me-stat"><span>HRV</span><strong style="color:var(--text-2);font-size:13px;font-family:var(--font-body);">${esc(e.hrv_status)}</strong></div>` : ''}
                ${e.recovery_advisory ? `<div class="me-stat"><span>Recovery</span><strong style="color:var(--text-2);font-size:13px;font-family:var(--font-body);">${esc(e.recovery_advisory)}</strong></div>` : ''}
            </div>` : ''}
            <div class="me-row">
                <div class="me-stat"><span>Mood</span><strong style="color:var(--accent);">${e.mood}</strong></div>
                <div class="me-stat"><span>Energy</span><strong style="color:var(--positive);">${e.energy}</strong></div>
            </div>
            ${e.mood_note ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:3px;font-style:italic;">"${esc(e.mood_note)}"</div>` : ''}
            ${e.energy_note ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:6px;font-style:italic;">"${esc(e.energy_note)}"</div>` : ''}
            ${e.focus_quality ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:3px;">${fLabels[e.focus_quality]||e.focus_quality}</div>` : ''}
            ${e.body_awareness ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:3px;">${bLabels[e.body_awareness]||e.body_awareness}</div>` : ''}
            ${e.movement ? `<div style="font-size:12px;color:var(--text-2);margin-bottom:3px;">${mLabels[e.movement]||e.movement}</div>` : ''}
            ${e.work_status ? `<div style="font-size:12px;color:${e.work_status==='done'?'var(--positive)':'var(--text-2)'};margin-bottom:3px;">${wLabels[e.work_status]||e.work_status}</div>` : ''}
            ${e.work_intention ? `<div style="font-size:12px;font-style:italic;color:var(--text-2);margin-top:6px;">"${esc(e.work_intention)}"</div>` : ''}
            ${e.note ? `<div style="font-size:13px;color:var(--text);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5;">${esc(e.note)}</div>` : ''}
        </div>
    `;
}

async function migrateLocalToSupabase() {
    if (!sbClient) return;
    const local = JSON.parse(localStorage.getItem('local_entries') || '[]');
    if (!local.length) return;

    showToast('Uploading ' + local.length + ' local entries to Supabase…');

    // Only include columns the schema actually has; drop local-only fields
    const allowedKeys = [
        'entry_date','type','cycle_day','mood','mood_note','energy','energy_note',
        'sleep_score','body_battery','hrv_status','recovery_advisory','steps_yesterday',
        'weight','work_intention','body_intention','focus_quality','body_awareness',
        'movement','work_status','note'
    ];

    const toInsert = local.map(e => {
        const row = {};
        allowedKeys.forEach(k => {
            // Only include the key if it has an actual value (skip null/undefined)
            if (e[k] !== null && e[k] !== undefined) row[k] = e[k];
        });
        return row;
    });

    // Insert one at a time so a single bad entry doesn't block the rest
    let uploaded = 0;
    let lastError = '';
    for (const row of toInsert) {
        try {
            const { error } = await sbClient.from('daily_checkins').insert([row]);
            if (!error) {
                uploaded++;
            } else {
                lastError = error.message;
                console.error('Migration row error:', error.message, row);
            }
        } catch(err) {
            lastError = String(err);
            console.error('Migration row exception:', err);
        }
    }

    if (uploaded > 0) {
        localStorage.removeItem('local_entries');
        showToast(uploaded + ' of ' + local.length + ' entries synced ✓');
    } else if (lastError) {
        showToast('Sync failed: ' + lastError.slice(0, 60));
    }
}

function saveSupabaseConfig() {
    const url = document.getElementById('sb-url').value.trim();
    const key = document.getElementById('sb-key').value.trim();
    if (!url || !key) { showToast('Enter both URL and key'); return; }
    localStorage.setItem('sb_url', url);
    localStorage.setItem('sb_key', key);
    if (initSupabase()) {
        // Migrate any locally-stored entries up to Supabase first, then reload
        migrateLocalToSupabase().then(() => {
            loadEntries().then(() => {
                renderSettings();
                if (currentView === 'checkin') renderCheckIn();
                if (currentView === 'log') renderLog();
            });
        });
    } else {
        showToast('Could not connect — check your details');
    }
}

async function requestNotifications() {
    if (!('Notification' in window)) { showToast('Not supported in this browser'); return; }
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
        scheduleNotifications();
        showToast('Notifications enabled ✓');
        renderSettings();
    } else {
        showToast('Permission denied — check your browser settings');
    }
}

function scheduleNotifications() {
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({ type: 'SCHEDULE' });
    }
}

async function exportData() {
    let dataToExport;
    if (sbClient) {
        // Export from Supabase when connected
        const { data, error } = await sbClient
            .from('daily_checkins').select('*')
            .order('created_at', { ascending: false });
        if (error || !data) {
            showToast('Export failed — try again');
            return;
        }
        dataToExport = JSON.stringify(data, null, 2);
        showToast('Exporting from Supabase...');
    } else {
        dataToExport = localStorage.getItem('local_entries') || '[]';
        showToast('Exporting local data...');
    }
    const blob = new Blob([dataToExport], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `daily-os-${todayStr()}.json`;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 60000);
}

function clearLocal() {
    if (confirm('Clear locally stored entries? Data already synced to Supabase is not affected.')) {
        localStorage.removeItem('local_entries');
        if (sbClient) {
            loadEntries().then(() => {
                if (currentView === 'log') renderLog();
                if (currentView === 'checkin') renderCheckIn();
            });
            showToast('Local data cleared — reloading from Supabase');
        } else {
            entries = [];
            showToast('Local data cleared');
            if (currentView === 'log') renderLog();
            if (currentView === 'checkin') renderCheckIn();
        }
    }
}

// ============================================================
async function uploadLocalToSupabase() {
    if (!sbClient) { showToast('Connect Supabase first'); return; }
    const local = JSON.parse(localStorage.getItem('local_entries') || '[]');
    if (!local.length) { showToast('No local entries to upload'); return; }

    const btn = document.getElementById('upload-local-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Uploading...'; }

    let uploaded = 0;
    let skipped = 0;
    const errors = [];

    // Same allowed columns as migrateLocalToSupabase — strips nulls so NOT NULL columns don't fail
    const allowedKeys = [
        'entry_date','type','cycle_day','mood','mood_note','energy','energy_note',
        'sleep_score','body_battery','hrv_status','recovery_advisory','steps_yesterday',
        'weight','work_intention','body_intention','focus_quality','body_awareness',
        'movement','work_status','note'
    ];

    for (const entry of local) {
        // Strip local_ id and created_at; only send schema columns with non-null values
        const toInsert = {};
        allowedKeys.forEach(k => {
            if (entry[k] !== null && entry[k] !== undefined) toInsert[k] = entry[k];
        });

        try {
            const { error } = await sbClient.from('daily_checkins').insert([toInsert]);
            if (error) {
                // Skip duplicates gracefully (unique constraint violations)
                if (error.code === '23505') { skipped++; }
                else { errors.push(error.message); }
            } else {
                uploaded++;
            }
        } catch(e) {
            errors.push(e.message);
        }
    }

    if (btn) { btn.disabled = false; btn.textContent = 'Upload'; }

    if (errors.length) {
        showToast(`${uploaded} uploaded, ${errors.length} failed`);
        console.error('Upload errors:', errors);
        return;
    }

    const msg = skipped
        ? `${uploaded} uploaded, ${skipped} already existed`
        : `${uploaded} entries uploaded ✓`;
    showToast(msg);

    // Reload from Supabase so everything is now visible
    await loadEntries();
    if (currentView === 'log') renderLog();
    if (currentView === 'checkin') renderCheckIn();
    renderSettings();
}

async function deleteEntry(id) {
    if (!id) { showToast("Can't delete this entry"); return; }
    if (!confirm('Delete this entry?')) return;

    if (id.startsWith('local_') || id.startsWith('saved_')) {
        const local = JSON.parse(localStorage.getItem('local_entries') || '[]');
        localStorage.setItem('local_entries', JSON.stringify(local.filter(e => e.id !== id)));
    } else if (sbClient) {
        const { error } = await sbClient.from('daily_checkins').delete().eq('id', id);
        if (error) { showToast('Could not delete — try again'); return; }
    } else {
        showToast('Not connected to database — cannot delete');
        return;
    }

    entries = entries.filter(e => e.id !== id);
    showToast('Deleted');
    if (currentView === 'log') renderLog();
    if (currentView === 'checkin') renderCheckIn();
}

async function loadUserSettings() {

            .from('user_data')
            .select('key, value')
            .in('key', ['about_me', 'profile']);
        if (error || !data) return;
        for (const row of data) {
            if (row.key === 'about_me' && row.value?.text !== undefined) {
                localStorage.setItem('about_me', row.value.text);
                aboutMe = row.value.text;

            if (row.key === 'profile') {

                if (p.height) localStorage.setItem('profile_height', p.height);

                if (p.goal_weight) localStorage.setItem('profile_goal_weight', p.goal_weight);
                else localStorage.removeItem('profile_goal_weight');

        }

        console.warn('Could not load user settings from Supabase:', e);
