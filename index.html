function getHealthHistoryContext() {
    const hh = getHealthHistory();
    const parts = [];

    if (hh.diagnoses && hh.diagnoses.length) {
        parts.push('Diagnoses: ' + hh.diagnoses.join(', '));
    }
    if (hh.medications && hh.medications.length) {
        parts.push('Medications: ' + hh.medications.map(m => `${m.name}${m.dose ? ' ' + m.dose : ''} (${m.purpose || 'purpose not recorded'})`).join(', '));
    }
    // Only inject flagged/abnormal blood results — saves tokens
    const flagged = (hh.blood_results || []).filter(r => r.flag === 'low' || r.flag === 'high' || r.flag === 'borderline');
    if (flagged.length) {
        parts.push('Flagged lab results: ' + flagged.map(r =>
            `${r.test} ${r.value}${r.unit ? ' ' + r.unit : ''} (range ${r.range}) — ${r.flag}${r.note ? ': ' + r.note : ''} [${r.date || 'undated'}]`
        ).join('; '));
    }
    if (hh.flagged_findings && hh.flagged_findings.length) {
        parts.push('Other notable findings: ' + hh.flagged_findings.join('; '));
    }

    return parts.length ? '\n\nHealth history:\n' + parts.join('\n') : '';
}

async function handleMedicalUpload(input) {
    const file = input.files[0];
    if (!file) return;

    // Reset input so same file can be re-uploaded
    input.value = '';

    const processing = document.getElementById('hh-processing');
    const review = document.getElementById('hh-review');
    const label = document.getElementById('upload-label');

    if (processing) processing.style.display = 'block';
    if (review) review.style.display = 'none';
    if (label) label.style.pointerEvents = 'none';

    // Rough size check client-side (6MB)
    if (file.size > 6_000_000) {
        if (processing) processing.style.display = 'none';
        if (label) label.style.pointerEvents = '';
        showToast('File too large — max 6MB. Try splitting it.');
        return;
    }

    // Read as base64
    const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
            // result is "data:application/pdf;base64,XXXX" — strip the prefix
            const result = reader.result;
            const commaIdx = result.indexOf(',');
            resolve(commaIdx !== -1 ? result.slice(commaIdx + 1) : result);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });

    try {
        const res = await fetch('/.netlify/functions/parse-medical', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                pdf_base64: base64,
                media_type: file.type || 'application/pdf',
                filename: file.name
            })
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({ error: 'Unknown error' }));
            throw new Error(err.error || 'Server error ' + res.status);
        }

        const data = await res.json();
        if (processing) processing.style.display = 'none';
        if (label) label.style.pointerEvents = '';

        renderHHReviewPanel(data.extracted, data.filename);

    } catch(err) {
        if (processing) processing.style.display = 'none';
        if (label) label.style.pointerEvents = '';
        showToast('Could not read document: ' + (err.message || 'try again'));
        console.error('Medical upload error:', err);
    }
}

function renderHHReviewPanel(extracted, filename) {
    const review = document.getElementById('hh-review');
    if (!review) return;

    const e = extracted || {};
    const docTitle = esc(e.doc_title || filename || 'Document');
    const docDate = esc(e.doc_date || 'Date unknown');

    // Build blood results table if any
    let bloodHtml = '';
    if (e.blood_results && e.blood_results.length) {
        const rows = e.blood_results.map(r => {
            const flagClass = r.flag === 'normal' || r.flag === 'absent' ? 'normal'
                : r.flag === 'borderline' ? 'borderline'
                : (r.flag === 'low' || r.flag === 'high') ? 'low' : '';
            const flagLabel = r.flag && r.flag !== 'normal' && r.flag !== 'absent' ? r.flag.toUpperCase() : '';
            return `<div class="result-row">
                <span class="result-name">${esc(r.test)}</span>
                <span class="result-val" style="color:${flagClass === 'low' ? 'var(--negative)' : flagClass === 'borderline' ? 'var(--accent)' : flagClass === 'normal' ? 'var(--positive)' : 'var(--text)'};">${esc(String(r.value))}${r.unit ? ' <span style="font-size:11px;font-weight:400;color:var(--text-2);">' + esc(r.unit) + '</span>' : ''}</span>
                <span class="result-flag ${flagClass}">${flagLabel}</span>
            </div>`;
        }).join('');
        bloodHtml = `<div class="hh-section" style="margin-top:12px;"><div class="hh-section-title">Lab results</div>${rows}</div>`;
    }

    // Diagnoses
    let diagHtml = '';
    if (e.diagnoses && e.diagnoses.length) {
        diagHtml = `<div class="hh-section"><div class="hh-section-title">Diagnoses</div>${e.diagnoses.map(d => `<span class="hh-tag">${esc(d)}</span>`).join('')}</div>`;
    }

    // Medications
    let medHtml = '';
    if (e.medications && e.medications.length) {
        medHtml = `<div class="hh-section"><div class="hh-section-title">Medications</div>${e.medications.map(m => `<span class="hh-tag">${esc(m.name)} ${esc(m.dose || '')} <span style="color:var(--text-3);font-size:11px;">${esc(m.purpose || '')}</span></span>`).join('')}</div>`;
    }

    // Flagged summary
    let flagHtml = '';
    if (e.flagged_summary && e.flagged_summary.length) {
        flagHtml = `<div class="hh-section"><div class="hh-section-title" style="color:var(--negative);">⚠ Notable findings</div>${e.flagged_summary.map(f => `<div style="font-size:13px;color:var(--text);margin-bottom:6px;padding:8px 10px;background:rgba(204,85,85,0.07);border-radius:8px;border-left:2px solid rgba(204,85,85,0.3);">${esc(f)}</div>`).join('')}</div>`;
    }

    // Other findings
    let otherHtml = '';
    if (e.other_findings && e.other_findings.length) {
        otherHtml = `<div class="hh-section"><div class="hh-section-title">Other findings</div>${e.other_findings.map(f => `<div style="font-size:13px;color:var(--text-2);margin-bottom:4px;">${esc(f)}</div>`).join('')}</div>`;
    }

    // Store extracted data temporarily on window for the save function
    window._pendingExtracted = extracted;

    review.innerHTML = `
        <div class="review-panel">
            <h3>📄 ${docTitle} <span style="font-size:12px;color:var(--text-3);font-weight:400;">${docDate}</span></h3>
            ${flagHtml}${diagHtml}${medHtml}${bloodHtml}${otherHtml}
            <div style="display:flex;gap:8px;margin-top:14px;">
                <button class="btn btn-primary" onclick="saveHealthHistoryFromReview()" style="flex:2;">Save to health history</button>
                <button class="btn btn-ghost" onclick="document.getElementById('hh-review').style.display='none';window._pendingExtracted=null;" style="flex:1;">Discard</button>
            </div>
        </div>`;
    review.style.display = 'block';
    review.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function saveHealthHistoryFromReview() {
    const extracted = window._pendingExtracted;
    if (!extracted) return;

    const hh = getHealthHistory();

    // Merge diagnoses (dedup by string)
    if (extracted.diagnoses && extracted.diagnoses.length) {
        const existing = new Set((hh.diagnoses || []).map(d => d.toLowerCase()));
        for (const d of extracted.diagnoses) {
            if (!existing.has(d.toLowerCase())) {
                (hh.diagnoses = hh.diagnoses || []).push(d);
                existing.add(d.toLowerCase());
            }
        }
    }

    // Merge medications (dedup by name+dose)
    if (extracted.medications && extracted.medications.length) {
        hh.medications = hh.medications || [];
        const existingMeds = new Set(hh.medications.map(m => (m.name + (m.dose || '')).toLowerCase()));
        for (const m of extracted.medications) {
            const key = (m.name + (m.dose || '')).toLowerCase();
            if (!existingMeds.has(key)) {
                hh.medications.push(m);
                existingMeds.add(key);
            }
        }
    }

    // Blood results — add with source date; if same test+date exists, replace
    if (extracted.blood_results && extracted.blood_results.length) {
        hh.blood_results = hh.blood_results || [];
        const docDate = extracted.doc_date || null;
        for (const r of extracted.blood_results) {
            const idx = hh.blood_results.findIndex(
                e => e.test.toLowerCase() === r.test.toLowerCase() && e.date === docDate
            );
            const entry = { ...r, date: docDate };
            if (idx !== -1) hh.blood_results[idx] = entry;
            else hh.blood_results.push(entry);
        }
    }

    // Flagged findings — merge unique strings
    if (extracted.flagged_summary && extracted.flagged_summary.length) {
        hh.flagged_findings = hh.flagged_findings || [];
        const existingFlags = new Set(hh.flagged_findings.map(f => f.toLowerCase()));
        for (const f of extracted.flagged_summary) {
            if (!existingFlags.has(f.toLowerCase())) {
                hh.flagged_findings.push(f);
                existingFlags.add(f.toLowerCase());
            }
        }
    }

    // Track sources
    hh.sources = hh.sources || [];
    hh.sources.unshift({
        filename: extracted.doc_title || 'document',
        date: extracted.doc_date || null,
        parsed_at: new Date().toISOString()
    });

    await saveHealthHistory(hh);
    window._pendingExtracted = null;

    const review = document.getElementById('hh-review');
    if (review) review.style.display = 'none';
    renderHealthHistoryCurrent();
    showToast('Health history updated ✓');
}

function renderHealthHistoryCurrent() {
    const container = document.getElementById('hh-current');
    if (!container) return;

    const hh = getHealthHistory();
    const hasData = (hh.diagnoses && hh.diagnoses.length)
        || (hh.medications && hh.medications.length)
        || (hh.blood_results && hh.blood_results.length)
        || (hh.flagged_findings && hh.flagged_findings.length);

    if (!hasData) {
        container.innerHTML = '<p style="font-size:13px;color:var(--text-3);margin-top:8px;">No health history saved yet — upload a document above.</p>';
        return;
    }

    let html = '<div style="margin-top:4px;">';

    if (hh.flagged_findings && hh.flagged_findings.length) {
        html += `<div class="hh-section"><div class="hh-section-title" style="color:var(--negative);">⚠ Notable findings</div>`;
        html += hh.flagged_findings.map((f, i) =>
            `<div style="font-size:13px;color:var(--text);margin-bottom:5px;display:flex;justify-content:space-between;align-items:start;gap:8px;"><span style="flex:1;">${esc(f)}</span><button onclick="removeHHItem('flagged_findings',${i})" style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:13px;flex-shrink:0;" title="Remove">✕</button></div>`
        ).join('');
        html += '</div>';
    }

    if (hh.diagnoses && hh.diagnoses.length) {
        html += `<div class="hh-section"><div class="hh-section-title">Diagnoses</div>`;
        html += hh.diagnoses.map((d, i) =>
            `<span class="hh-tag">${esc(d)}<button class="hh-del" onclick="removeHHItem('diagnoses',${i})" title="Remove">✕</button></span>`
        ).join('');
        html += '</div>';
    }

    if (hh.medications && hh.medications.length) {
        html += `<div class="hh-section"><div class="hh-section-title">Medications</div>`;
        html += hh.medications.map((m, i) =>
            `<span class="hh-tag">${esc(m.name)} ${esc(m.dose || '')} <span style="color:var(--text-3);font-size:11px;">${esc(m.purpose || '')}</span><button class="hh-del" onclick="removeHHItem('medications',${i})" title="Remove">✕</button></span>`
        ).join('');
        html += '</div>';
    }

    // Blood results — show flagged first, then normal, collapsible
    if (hh.blood_results && hh.blood_results.length) {
        const flagged = hh.blood_results.filter(r => r.flag !== 'normal' && r.flag !== 'absent');
        const normal = hh.blood_results.filter(r => r.flag === 'normal' || r.flag === 'absent');
        html += `<div class="hh-section"><div class="hh-section-title">Lab results (${hh.blood_results.length})</div>`;
        if (flagged.length) {
            html += flagged.map((r, i) => {
                const globalIdx = hh.blood_results.indexOf(r);
                const flagClass = r.flag === 'borderline' ? 'borderline' : 'flagged';
                return `<div class="hh-tag ${flagClass}" style="display:flex;justify-content:space-between;width:calc(100% - 8px);margin-right:0;">
                    <span>${esc(r.test)}: <strong>${esc(String(r.value))} ${esc(r.unit || '')}</strong> (${esc(r.flag)}${r.date ? ' · ' + esc(r.date) : ''})</span>
                    <button class="hh-del" onclick="removeHHItem('blood_results',${globalIdx})" title="Remove">✕</button>
                </div>`;
            }).join('');
        }
        if (normal.length) {
            html += `<button onclick="toggleElement('hh-normal-results')" style="background:none;border:none;color:var(--text-3);font-size:12px;cursor:pointer;padding:4px 0;">${normal.length} normal results ▶</button>`;
            html += `<div id="hh-normal-results" style="display:none;">`;
            html += normal.map((r) => {
                const globalIdx = hh.blood_results.indexOf(r);
                return `<div class="hh-tag normal" style="display:flex;justify-content:space-between;width:calc(100% - 8px);margin-right:0;">
                    <span>${esc(r.test)}: ${esc(String(r.value))} ${esc(r.unit || '')}${r.date ? ' · ' + esc(r.date) : ''}</span>
                    <button class="hh-del" onclick="removeHHItem('blood_results',${globalIdx})" title="Remove">✕</button>
                </div>`;
            }).join('');
            html += '</div>';
        }
        html += '</div>';
    }

    if (hh.sources && hh.sources.length) {
        html += `<div style="margin-top:8px;font-size:11px;color:var(--text-3);">Sources: ${hh.sources.map(s => esc(s.filename)).join(', ')}</div>`;
    }

    html += `<button onclick="clearHealthHistory()" style="background:none;border:none;color:var(--negative);font-size:12px;cursor:pointer;margin-top:10px;padding:0;">Clear all health history</button>`;
    html += '</div>';

    container.innerHTML = html;
}

        hh[field].splice(idx, 1);

        renderHealthHistoryCurrent();
    }
}

function toggleElement(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const btn = el.previousElementSibling;
    if (el.style.display === 'none') {
        el.style.display = 'block';
        if (btn) btn.textContent = btn.textContent.replace('▶', '▼');
    } else {
        el.style.display = 'none';
        if (btn) btn.textContent = btn.textContent.replace('▼', '▶');
    }
}

function renderPatternReadHtml(text, label, entryCount) {
    if (!text) return '';
    const safeText = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    const rendered = safeText
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n\n/g, '</p><p style="margin-top:14px;">')
        .replace(/\n/g, '<br>');
    return `<div style="margin-top:16px;background:var(--surface-2);border-radius:14px;padding:18px;border:1px solid var(--border);font-size:14px;line-height:1.7;color:var(--text);"><p>${rendered}</p></div>
        <p style="font-size:11px;color:var(--text-3);margin-top:10px;">Based on ${entryCount} entries · ${esc(label)}</p>`;
}

function restoreLastPatternRead() {
    const el = document.getElementById('synthesis-result');
    if (!el || el.innerHTML.trim()) return; // don't overwrite if already populated
    const reads = JSON.parse(localStorage.getItem('pattern_reads') || '[]');
    if (!reads.length) return;
    const r = reads[0];
    // Re-render from stored text rather than re-injecting stored HTML
    if (r.text) {
        el.innerHTML = renderPatternReadHtml(r.text, r.label, r.entryCount || 0);
    } else if (r.html) {
        // Legacy entries stored as HTML — sanitise by stripping script tags before inject
        el.innerHTML = r.html.replace(/<script[^>]*>[\s\S]*?<\/script>/gi, '');
    }
}

function renderSynthesisHistory() {
    const container = document.getElementById('synthesis-history');
    if (!container) return;
    const reads = JSON.parse(localStorage.getItem('pattern_reads') || '[]');
    if (reads.length <= 1) { container.innerHTML = ''; return; }

    // Show all but the current (index 0 is always in synthesis-result)
    const past = reads.slice(1);
    const items = past.map((r, i) => {
        // Re-render from stored plain text — never inject raw stored HTML
        const safeHtml = r.text
            ? renderPatternReadHtml(r.text, r.label, r.entryCount || 0)
            : r.html
                ? r.html.replace(/<script[^>]*>[\s\S]*?<\/script>/gi, '')
                : '';
        return `
        <div style="margin-top:8px;">
            <button onclick="toggleHistoryItem(${i+1})"
                style="background:none;border:none;color:var(--text-2);font-size:12px;cursor:pointer;
                       padding:6px 0;display:flex;align-items:center;gap:6px;width:100%;">
                <span style="font-size:10px;color:var(--text-3);">▶</span>
                <span>${esc(r.label)}</span>
            </button>
            <div id="history-item-${i+1}" style="display:none;">${safeHtml}</div>
        </div>`;
    }).join('');

    container.innerHTML = `<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">
        <h3 style="margin-bottom:8px;">Previous reads</h3>
        ${items}
    </div>`;
}

function toggleHistoryItem(i) {
    const el = document.getElementById('history-item-' + i);
    if (!el) return;
    const btn = el.previousElementSibling;
    const arrow = btn ? btn.querySelector('span') : null;
    if (el.style.display === 'none') {
        el.style.display = 'block';
        if (arrow) arrow.textContent = '▼';
    } else {
        el.style.display = 'none';
        if (arrow) arrow.textContent = '▶';
    }
}

async function handleQLAttachment(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = ''; // allow re-selecting same file

    // 3MB client limit — leaves room for conversation overhead within Netlify's 6MB body limit
    if (file.size > 3_000_000) {
        showToast('File too large for chat — max 3MB. Use Setup → Health history for full documents.');
        return;
    }

    const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
            const result = reader.result;
            const comma = result.indexOf(',');
            resolve(comma !== -1 ? result.slice(comma + 1) : result);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });

    qlAttachment = { base64, media_type: file.type || 'application/pdf', filename: file.name };

    const chip = document.getElementById('ql-attachment-chip');
    const nameEl = document.getElementById('ql-attachment-name');
    if (chip) chip.style.display = 'flex';
    if (nameEl) nameEl.textContent = file.name;

    // Focus the textarea so user can type their message about the file
    const input2 = document.getElementById('ql-input');
    if (input2) {
        input2.placeholder = 'Ask something about this file...';
        setTimeout(() => input2.focus(), 100);
    }
}

function removeQLAttachment() {
    qlAttachment = null;
    const chip = document.getElementById('ql-attachment-chip');
    if (chip) chip.style.display = 'none';
    const fi = document.getElementById('ql-file-input');
    if (fi) fi.value = '';
    const input = document.getElementById('ql-input');
    if (input) input.placeholder = "What's going on...";
}

async function sendQL() {
    const input = document.getElementById('ql-input');
    const text = input.value.trim();
    if (!text || qlSaving || qlFetching) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('ql-send').disabled = true;

    // Build message content — array if file attached, string otherwise
    let userContent;
    if (qlAttachment) {
        userContent = [
            { type: 'document', source: { type: 'base64', media_type: qlAttachment.media_type, data: qlAttachment.base64 } },
            { type: 'text', text }
        ];
        // Show attachment bubble + text bubble
        const attachBubble = document.createElement('div');
        attachBubble.className = 'bubble bubble-user';
        attachBubble.style.cssText = 'display:flex;align-items:center;gap:6px;font-size:13px;';
        attachBubble.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="13" height="13"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg> ' + esc(qlAttachment.filename);
        document.getElementById('ql-body').appendChild(attachBubble);
        qlHasDocument = true;
        qlAttachment = null;
        const chip = document.getElementById('ql-attachment-chip');
        if (chip) chip.style.display = 'none';
        // Update placeholder back
        input.placeholder = 'Reply...';
    } else {
        userContent = text;
    }

    addBubble(text, 'user');
    qlConversation.push({ role: 'user', content: userContent });

    if (qlDone) return;

    qlFetching = true;
    addThinking();
    const reply = await getQLResponse();
    removeThinking();
    qlFetching = false;

    if (reply) {
        if (reply.type === 'question' || reply.type === 'answer') {
            addBubble(reply.text, 'ai');
            qlConversation.push({ role: 'assistant', content: reply.text });
            qlFollowUpCount++;
            input.placeholder = 'Reply...';
            // Show wrap-up button after first exchange
            const wrapBtn = document.getElementById('ql-wrap-btn');
            if (wrapBtn && qlFollowUpCount >= 1) wrapBtn.style.display = 'block';
            setTimeout(() => input.focus(), 200);
        } else if (reply.type === 'done') {
            addBubble(reply.text, 'ai');
            qlConversation.push({ role: 'assistant', content: reply.text });
            if (reply.action) {
                const actionDiv = document.createElement('div');
                actionDiv.className = 'bubble bubble-action';
                actionDiv.innerHTML = '<strong>One thing:</strong> ' + esc(reply.action);
                document.getElementById('ql-body').appendChild(actionDiv);
                document.getElementById('ql-body').scrollTop = document.getElementById('ql-body').scrollHeight;
            }
            qlDone = true;
            document.getElementById('ql-input-row').style.display = 'none';
            await saveQuickLog();
            setTimeout(() => {
                if (currentView === 'log') renderLog();
            }, 400);
        }
    }
}

async function wrapUpQL() {
    if (qlDone || qlFetching || qlSaving) return;
    const wrapBtn = document.getElementById('ql-wrap-btn');
    if (wrapBtn) wrapBtn.style.display = 'none';
    const input = document.getElementById('ql-input');
    if (input) { input.value = ''; input.style.height = 'auto'; }
    document.getElementById('ql-send').disabled = true;

    qlFetching = true;
    addThinking();
    const reply = await getQLResponse(true); // forceWrapUp = true
    removeThinking();
    qlFetching = false;

    if (reply && reply.type === 'done') {
        addBubble(reply.text, 'ai');
        qlConversation.push({ role: 'assistant', content: reply.text });
        if (reply.action) {
            const actionDiv = document.createElement('div');
            actionDiv.className = 'bubble bubble-action';
            actionDiv.innerHTML = '<strong>One thing:</strong> ' + esc(reply.action);
            document.getElementById('ql-body').appendChild(actionDiv);
            document.getElementById('ql-body').scrollTop = document.getElementById('ql-body').scrollHeight;
        }
        qlDone = true;
        document.getElementById('ql-input-row').style.display = 'none';
        await saveQuickLog();
        setTimeout(() => { if (currentView === 'log') renderLog(); }, 400);
    } else {
        // AI ignored the wrap instruction — restore the wrap button so user can try again
        const wrapBtn = document.getElementById('ql-wrap-btn');
        if (wrapBtn) wrapBtn.style.display = 'block';
    }
}

function buildQLSystemPrompt() {
    const recent = getRecentEntries(14);
    const recentSummary = recent.slice(0, 10).map(e => {
        const parts = [`[${e.entry_date} ${e.type}] mood:${e.mood} energy:${e.energy}`];
        if (e.energy_note) parts.push(`energy note: "${e.energy_note}"`);
        if (e.mood_note) parts.push(`mood note: "${e.mood_note}"`);
        if (e.focus_quality) parts.push(`focus: ${e.focus_quality}`);
        if (e.body_awareness) parts.push(`food: ${e.body_awareness}`);
        if (e.movement) parts.push(`movement: ${e.movement}`);
        if (e.note) parts.push(`note: "${e.note}"`);
        return parts.join(', ');
    }).join('\n');

    const lastCycle = recent.find(e => e.cycle_day);
    const phaseInfo = lastCycle ? `Current cycle day approximately ${lastCycle.cycle_day} (logged ${lastCycle.entry_date})` : 'Cycle day unknown';

    const customContext = (aboutMe ? `\n\nAdditional context (user-provided):\n${aboutMe}` : '') + getProfileContext() + getHealthHistoryContext();
    return `You are a personal behaviour coach inside a daily tracking app for Nik, a 37-year-old woman in Agnes Water, Queensland.

About Nik:
- ADHD, autism, binge eating disorder, hyphenxiety (hypersensitivity/anxiety), depression, suspected PMDD
- On Ozempic (weight management), Prozac (daily), Vyvanse (ADHD/BED)
- Runs her own marketing consultancy. Working on weight loss, fitness, business consistency
- Smart, direct, no-nonsense. Hates being patronised. Voice-to-text user so replies may be casual/rough
- ${phaseInfo}${customContext}

IMPORTANT — Medical correlation awareness: If Nik reports symptoms that could plausibly connect to her health history (e.g. fatigue + low androstenedione, mood changes + hormonal flags, recurring infections + low neutrophils), gently surface the connection if relevant. Don't lecture. One sentence if relevant, nothing if not.

Recent check-in data:
${recentSummary || 'No recent data yet'}

How to respond — choose the right mode based on what Nik is doing:

COACHING MODE (when Nik logs something that happened or how she's feeling):
- Lead with 1 observation from her recent data if relevant, then ask 1 specific short question (max 15 words combined).
- Connect to her data: "third low-energy Wednesday this month" beats "you've been tired."
- When you receive "[Wrap up now]": give a brief pattern observation (1-2 sentences, factual not preachy) and ONE concrete action.
- Respond: {"type":"question","text":"observation + question"} or {"type":"done","text":"...","action":"..."}

ANALYSIS MODE (when Nik shares a document — lab results, reports, medical letters):
- Read the document thoroughly in the context of her health history and recent tracking data.
- Connect dots explicitly: if something in the document relates to her symptoms, flagged results, or patterns, name it directly.
- Be thorough but direct. No padding.
- Respond: {"type":"answer","text":"your analysis here"}

CONVERSATION MODE (questions, thinking something through, general discussion):
- Be a direct, smart sounding board. Short unless depth is needed.
- Respond: {"type":"answer","text":"your response here"}

Always keep the conversation going — Nik decides when to end it via "Wrap it up →".
Keep it warm but direct. No "that's great!" No "I hear you." No unnecessary paragraphs.

Respond ONLY as valid JSON. No markdown fences. No other text.`;
}

async function getQLResponse(forceWrapUp = false) {
    const messages = [...qlConversation];
    if (forceWrapUp) {
        messages.push({ role: 'user', content: '[Wrap up now]' });
    }

    try {
        const res = await fetch('/.netlify/functions/claude', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                system: buildQLSystemPrompt(),
                messages,
                max_tokens: qlHasDocument ? 800 : 300
            })
        });
        if (!res.ok) throw new Error('Function returned ' + res.status);
        const data = await res.json();
        if (!data.content) throw new Error('Unexpected response shape');
        const raw = data.content[0]?.text || '';
        const clean = raw.replace(/```json|```/g, '').trim();
        return JSON.parse(clean);
    } catch(e) {
        console.error('QL error:', e);
        return { type: 'done', text: 'Logged.', action: null };
    }
}

async function saveQuickLog() {
    if (qlSaving) return;
    qlSaving = true;
    // Extract readable text from messages — content may be array (when document was attached)
    const getContentText = (content) => {
        if (typeof content === 'string') return content;
        if (Array.isArray(content)) {
            const docBlock = content.find(b => b.type === 'document');
            const textBlock = content.find(b => b.type === 'text');
            const parts = [];
            if (docBlock) parts.push('[Attached document]');
            if (textBlock) parts.push(textBlock.text);
            return parts.join(' ');
        }
        return '';
    };
    const logText = qlConversation.map(m => `${m.role === 'user' ? 'Nik' : 'Coach'}: ${getContentText(m.content)}`).join('\n');
    const entry = {
        entry_date: todayStr(),
        type: 'quicklog',
        mood: null,
        energy: null,
        note: logText
    };

    try {
        if (sbClient) {
            const { data: row, error } = await sbClient
                .from('daily_checkins').insert([entry]).select().single();
            if (!error && row) {
                entries.unshift(row);
                qlSaving = false;
                return;
            }
            console.error('Supabase quicklog save error:', error?.message);
        }
        // Fallback or non-Supabase path
        const local = JSON.parse(localStorage.getItem('local_entries') || '[]');
        const localRow = { ...entry, id: `local_${Date.now()}`, created_at: new Date().toISOString() };
        local.unshift(localRow);
        localStorage.setItem('local_entries', JSON.stringify(local));
        entries.unshift(localRow);
    } catch(e) {
        console.error('Save error:', e);
    }
    qlSaving = false;
}

let spotData = { mood: null, energy: null, mood_note: null, energy_note: null, note: null };

function openSpotCheckIn() {
    spotData = { mood: null, energy: null, mood_note: null, energy_note: null, note: null };
    const today = todayStr();
    const morningEntry = entries.find(e => e.entry_date === today && e.type === 'morning');
    const workIntention = morningEntry?.work_intention || null;

    const body = document.getElementById('spot-body');
    body.innerHTML = `
        <div style="padding-bottom:4px;">
            ${workIntention ? `<div style="font-size:12px;color:var(--text-3);margin-bottom:12px;padding:10px 12px;background:var(--surface-2);border-radius:10px;border-left:2px solid rgba(232,148,10,0.3);">This morning: "${esc(workIntention)}"</div>` : ''}
            <p class="spot-label">Mood</p>
            <p class="spot-sub">1 = rough, 5 = solid</p>
            <div class="spot-scale" id="spot-mood-scale">
                ${[1,2,3,4,5].map(n => `<button class="spot-scale-btn" onclick="selectSpotScale('mood',${n},this)">${n}</button>`).join('')}
            </div>
            <input type="text" class="text-input" style="margin-top:10px;" placeholder="Mood note (optional)"
                oninput="spotData.mood_note=this.value.trim()||null">

            <p class="spot-label">Energy</p>
            <p class="spot-sub">1 = flat, 5 = firing</p>
            <div class="spot-scale" id="spot-energy-scale">
                ${[1,2,3,4,5].map(n => `<button class="spot-scale-btn" onclick="selectSpotScale('energy',${n},this)">${n}</button>`).join('')}
            </div>
            <input type="text" class="text-input" style="margin-top:10px;" placeholder="Energy note (optional)"
                oninput="spotData.energy_note=this.value.trim()||null">

            <p class="spot-label" style="font-size:20px;">What's happening? <span style="color:var(--text-3);font-size:14px;">optional</span></p>
            <textarea class="text-input" rows="2" style="margin-top:6px;" placeholder="Quick note..."
                oninput="spotData.note=this.value.trim()||null"></textarea>
        </div>`;

    document.getElementById('spot-modal').style.display = 'flex';
}

function selectSpotScale(field, val, btn) {
    spotData[field] = val;
    btn.closest('.spot-scale').querySelectorAll('.spot-scale-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
}

function closeSpotCheckIn() {
    document.getElementById('spot-modal').style.display = 'none';
}

async function submitSpotCheckIn() {
    if (!spotData.mood || !spotData.energy) { showToast('Tap a mood and energy score first'); return; }
    const btn = document.getElementById('spot-save-btn');
    if (btn) btn.disabled = true;

    const entry = {
        type: 'spot',
        entry_date: todayStr(),
        mood: spotData.mood,
        energy: spotData.energy,
        mood_note: spotData.mood_note,
        energy_note: spotData.energy_note,
        note: spotData.note
    };

    try {
        const { data } = await saveEntry(entry);
        if (data) entries.unshift(data);
        closeSpotCheckIn();
        showToast('Spot check-in saved ✓');
        if (currentView === 'checkin') renderCheckIn();
        if (currentView === 'log') renderLog();
    } catch(e) {
        showToast('Could not save — try again');
    } finally {
        if (btn) btn.disabled = false;
    }
}

// ============================================================
// EDIT ENTRY
// ============================================================
let editingId = null;
let editingData = {};

function editEntry(id) {
    const entry = entries.find(e => e.id === id);
    if (!entry) { showToast("Can't find that entry"); return; }
    if (entry.type === 'quicklog') { showToast("Quick logs can't be edited — they're conversation transcripts"); return; }
    // spot uses same modal path as morning/afternoon but with minimal fields
    editingId = id;
    editingData = { ...entry };
    document.getElementById('edit-modal-title').textContent =
        entry.type === 'morning' ? 'Edit morning entry'
        : entry.type === 'spot' ? 'Edit spot check-in'
        : 'Edit afternoon entry';
    renderEditModal(entry);
    document.getElementById('edit-modal').style.display = 'flex';
}

function closeEditModal() {
    document.getElementById('edit-modal').style.display = 'none';
    editingId = null;
    editingData = {};
}

function renderEditModal(e) {
    const body = document.getElementById('edit-modal-body');
    const isMorning = e.type === 'morning';
    const isSpot = e.type === 'spot';

    // Helper builders — all inline to avoid variable-name clashes with outer scope
    const numField = (label, key, val, min, max) =>
        `<div class="edit-field"><label class="edit-label">${label}</label>` +
        `<input type="number" class="text-input" style="margin-top:4px;" min="${min ?? ''}" max="${max ?? ''}" inputmode="decimal"` +
        ` value="${val ?? ''}" placeholder="(optional)"` +
        ` oninput="editingData['${key}']=this.value.trim()!==''?parseFloat(this.value):null"></div>`;

    const textField = (label, key, val) =>
        `<div class="edit-field"><label class="edit-label">${label}</label>` +
        `<input type="text" class="text-input" style="margin-top:4px;" value="${esc(val || '')}" placeholder="(optional)"` +
        ` oninput="editingData['${key}']=this.value.trim()||null"></div>`;

    const textareaField = (label, key, val) =>
        `<div class="edit-field"><label class="edit-label">${label}</label>` +
        `<textarea class="text-input" rows="3" style="margin-top:4px;" placeholder="(optional)"` +
        ` oninput="editingData['${key}']=this.value.trim()||null">${esc(val || '')}</textarea></div>`;

    const scaleField = (label, key, val) => {
        const btns = [1,2,3,4,5].map(n =>
            `<button class="edit-scale-btn${val==n?' selected':''}"` +
            ` onclick="this.parentNode.querySelectorAll('.edit-scale-btn').forEach(b=>b.classList.remove('selected'));` +
            `this.classList.add('selected');editingData['${key}']=${n};">${n}</button>`
        ).join('');
        return `<div class="edit-field"><label class="edit-label">${label}</label><div class="edit-scale-row">${btns}</div></div>`;
    };

    const selField = (label, key, val, opts) => {
        const options = opts.map(o => `<option value="${o.v}"${val===o.v?' selected':''}>${o.l}</option>`).join('');
        return `<div class="edit-field"><label class="edit-label">${label}</label>` +
            `<select class="edit-select" onchange="editingData['${key}']=this.value||null">${options}</select></div>`;
    };

    let h = '';

    if (isMorning && !isSpot) {
        h += numField('Cycle day', 'cycle_day', e.cycle_day, 1, 35);
        h += numField('Sleep score (0–100)', 'sleep_score', e.sleep_score, 0, 100);
        h += numField('Body battery (0–100)', 'body_battery', e.body_battery, 0, 100);
        h += selField('HRV status', 'hrv_status', e.hrv_status, [
            {v:'',l:'(skip)'},{v:'poor',l:'Poor'},{v:'low',l:'Low'},
            {v:'balanced',l:'Balanced'},{v:'good',l:'Good'}]);
        h += selField('Recovery advisory', 'recovery_advisory', e.recovery_advisory, [
            {v:'',l:'(skip)'},{v:'recover',l:'Recover'},{v:'maintain',l:'Maintain'},{v:'push',l:'Push'}]);
        h += numField('Steps yesterday', 'steps_yesterday', e.steps_yesterday, 0, null);
        h += numField('Weight (kg)', 'weight', e.weight, 30, 300);
    }

    h += scaleField('Mood', 'mood', e.mood);
    h += textField('Mood note', 'mood_note', e.mood_note);
    h += scaleField('Energy', 'energy', e.energy);
    h += textField('Energy note', 'energy_note', e.energy_note);

    if (isMorning && !isSpot) {
        h += textField('Work intention', 'work_intention', e.work_intention);
        h += textField('Body intention', 'body_intention', e.body_intention);
    } else if (isSpot) {
        h += textareaField('Notes', 'note', e.note);
    } else {
        h += selField('Focus quality', 'focus_quality', e.focus_quality, [
            {v:'',l:'(skip)'},{v:'on_target',l:'On target'},{v:'scattered',l:'Scattered'},
            {v:'hyperfocused',l:'Hyperfocused'},{v:'checked_out',l:'Checked out'}]);
        h += selField('Food awareness', 'body_awareness', e.body_awareness, [
            {v:'',l:'(skip)'},{v:'checked_in',l:'Checked in'},{v:'drifted',l:'Drifted'},{v:'autopilot',l:'Autopilot'}]);
        h += selField('Movement', 'movement', e.movement, [
            {v:'',l:'(skip)'},{v:'yes',l:'Yes, properly'},{v:'a_bit',l:'A bit'},{v:'no',l:'Not today'}]);
        h += selField('Work status', 'work_status', e.work_status, [
            {v:'',l:'(skip)'},{v:'done',l:'Done'},{v:'in_progress',l:'In progress'},{v:'didnt_happen',l:"Didn't happen"}]);
        h += textareaField('Notes', 'note', e.note);
    }

    body.innerHTML = h;
}

async function saveEditedEntry() {
    if (!editingId) return;
    if (!editingData.mood || !editingData.energy) { showToast('Mood and energy are required'); return; }
    const btn = document.getElementById('edit-save-btn');
    if (btn) btn.disabled = true;

    // Never overwrite immutable fields
    const toSave = { ...editingData };
    delete toSave.id;
    delete toSave.created_at;
    delete toSave.entry_date;

    try {
        if (editingId.startsWith('local_') || editingId.startsWith('saved_')) {
            const local = JSON.parse(localStorage.getItem('local_entries') || '[]');
            const idx = local.findIndex(e => e.id === editingId);
            if (idx !== -1) {
                local[idx] = { ...local[idx], ...toSave };
                localStorage.setItem('local_entries', JSON.stringify(local));
            } else {
                showToast('Entry not found in local storage');
                if (btn) btn.disabled = false;
                return;
            }
        } else if (sbClient) {
            const { error } = await sbClient.from('daily_checkins').update(toSave).eq('id', editingId);
            if (error) { showToast('Could not save — try again'); if (btn) btn.disabled = false; return; }
        } else {
            showToast('Not connected — cannot save edit');
            if (btn) btn.disabled = false;
            return;
        }
        // Update in-memory array
        const idx = entries.findIndex(e => e.id === editingId);
        if (idx !== -1) entries[idx] = { ...entries[idx], ...toSave };

        showToast('Saved ✓');
        closeEditModal();
        if (currentView === 'log') renderLog();
        if (currentView === 'checkin') { getTodayEntries(); renderCheckIn(); }
    } catch(err) {
        console.error('Edit save error:', err);
        showToast('Something went wrong');
    } finally {
        if (btn) btn.disabled = false;
    }
}

// INIT
// ============================================================
async function init() {
    if ('serviceWorker' in navigator) {
        try { await navigator.serviceWorker.register('/sw.js'); } catch(e) {}
    }
    initSupabase();
    aboutMe = localStorage.getItem('about_me') || '';
    // If Supabase is already connected, silently migrate any leftover local entries
    if (sbClient) await migrateLocalToSupabase();
    await loadUserSettings();
    await loadHealthHistoryFromSupabase();
    await loadEntries();
    renderCheckIn();
    if (Notification?.permission === 'granted') setTimeout(scheduleNotifications, 1000);
}

async function syncNow(btn) {
    if (!sbClient) return;
    if (btn) { btn.textContent = '↻ Syncing...'; btn.disabled = true; }
    await loadUserSettings();
    await loadHealthHistoryFromSupabase();
    await loadEntries();
    if (currentView === 'checkin') renderCheckIn();
    if (currentView === 'insights') renderInsights();
    if (currentView === 'log') renderLog();
    if (currentView === 'settings') renderSettings();
    showToast('Synced ✓');
}

// Re-sync from Supabase when app comes back to foreground (tab/app switch)
document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && sbClient) {
        await loadUserSettings();
        await loadHealthHistoryFromSupabase();
        await loadEntries();
        // Re-render whichever view is active so new data shows immediately
        if (currentView === 'checkin') renderCheckIn();
        if (currentView === 'insights') renderInsights();
        if (currentView === 'log') renderLog();
        if (currentView === 'settings') renderSettings();
    }
});

init();
